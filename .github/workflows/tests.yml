name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run normalizer tests
        working-directory: tests
        run: python test_normalizer.py

      - name: Run RUT tests (28 casos curados)
        run: PYTHONPATH=app:. python tests/test_rut.py

      - name: Run RUT variantes (1000 casos generados)
        run: PYTHONPATH=app:. python tests/test_rut_variantes.py

      - name: Run horarios con break
        run: PYTHONPATH=app:. python tests/test_horarios_break.py

      - name: Run offline flow harness
        working-directory: tests
        env:
          SKIP_LLM: "1"
        run: python harness_50.py || true
