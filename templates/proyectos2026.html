<style>
  :root {
    --bg: #0E2530;
    --bg-deep: #081820;
    --panel: rgba(14, 37, 48, 0.88);
    --panel-solid: #112b38;
    --text: #E8E0D0;
    --text-dim: #8a9aa4;
    --accent: #B98149;
    --accent-soft: rgba(185, 129, 73, 0.15);
    --border: rgba(232, 224, 208, 0.08);
    --border-strong: rgba(232, 224, 208, 0.22);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    width: 100vw; height: 100vh;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  /* Watermark logo: elegante + tecnológico */
  body::before {
    content: "";
    position: fixed;
    top: 50%; left: 50%;
    width: min(78vmin, 880px);
    height: min(78vmin, 880px);
    transform: translate(-50%, -50%);
    background: url('/static/olacore_sello.svg') center/contain no-repeat;
    opacity: 0.055;
    pointer-events: none;
    z-index: 1;
    filter: drop-shadow(0 0 40px rgba(185, 129, 73, 0.25));
    animation: sello-spin 240s linear infinite;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 20% 15%, rgba(185, 129, 73, 0.08), transparent 50%),
      radial-gradient(circle at 80% 85%, rgba(56, 189, 248, 0.06), transparent 55%),
      radial-gradient(circle at 50% 50%, transparent 40%, rgba(8, 24, 32, 0.45) 100%);
    pointer-events: none;
    z-index: 1;
  }
  @keyframes sello-spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }
  canvas { display: block; cursor: grab; position: relative; z-index: 2; }
  canvas:active { cursor: grabbing; }

  .overlay-header {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    background: linear-gradient(to bottom, rgba(8, 24, 32, 0.96), rgba(8, 24, 32, 0));
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 14px; position: relative; z-index: 12; }
  .brand-logo {
    width: 46px; height: 46px;
    border-radius: 12px;
    background: radial-gradient(circle at 50% 50%, #102b38 0%, #0a1d26 100%);
    border: 1px solid rgba(185, 129, 73, 0.35);
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 4px 20px rgba(185, 129, 73, 0.25),
      inset 0 0 18px rgba(185, 129, 73, 0.08);
    overflow: hidden;
    padding: 4px;

  .brand-logo img { width: 100%; height: 100%; display: block; }
  .brand-text { display: flex; flex-direction: column; }
  .brand-title {
    font-size: 15px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase;
    background: linear-gradient(90deg, #E8E0D0 0%, #B98149 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .brand-subtitle {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.24em; text-transform: uppercase;
    font-family: 'IBM Plex Mono', ui-monospace, monospace;

  .year-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: rgba(74, 222, 128, 0.12);
    border: 1px solid rgba(74, 222, 128, 0.3);
    border-radius: 999px;
    font-size: 11px; font-weight: 600;

  .filters { display: flex; gap: 8px; flex-wrap: wrap; max-width: 60%; }

    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px; font-weight: 500;

  .zoom-label { font-size: 10px; color: var(--text-dim); text-align: center; font-variant-numeric: tabular-nums; }

    backdrop-filter: blur(10px);

    border-radius: 12px;
    z-index: 10;

  .stat-label { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; font-size: 9px; font-weight: 600; }

  .detail-panel {

</style>

  { from: 'cmc-hub', to: 'cmc-admin' },
  { from: 'cmc-chatbot', to: 'cmc-medilink' },
  { from: 'cmc-chatbot', to: 'cmc-ges' },

  // Meulen interno

  { from: 'meulen-hub', to: 'meulen-admin' },

  // Stack compartido (ambos proyectos apuntan acá)

/* ===== CANVAS ===== */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let camera = { x: 0, y: 0, zoom: 1 };
let dpr = Math.max(1, window.devicePixelRatio || 1);

function resize() {
  dpr = Math.max(1, window.devicePixelRatio || 1);
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

const nodeMap = new Map();
NODES.forEach((n, i) => {
  // Posicionar CMC en la izquierda y Meulen en la derecha, shared al medio-abajo
  let bias = { x: 0, y: 0 };
  if (n.cat === 'cmc') bias = { x: -300, y: 0 };
  else if (n.cat === 'meulen') bias = { x: 300, y: 0 };
  else if (n.cat === 'shared') bias = { x: 0, y: 250 };
  else if (n.cat === 'external') bias = { x: (Math.random() > 0.5 ? 550 : -550), y: -250 };
  const angle = (i / NODES.length) * Math.PI * 2;
  n.x = bias.x + Math.cos(angle) * 120 + (Math.random() - 0.5) * 60;
  n.y = bias.y + Math.sin(angle) * 120 + (Math.random() - 0.5) * 60;
  n.vx = 0; n.vy = 0; n.hidden = false;
  nodeMap.set(n.id, n);
});

const SIM = { repulsion: 9000, attraction: 0.009, centerForce: 0.0018, damping: 0.85, minDist: 90 };
let focusedNodeId = null, hoveredNodeId = null, draggingNodeId = null;
let panning = false, lastPointer = { x: 0, y: 0 };
let activeFilters = new Set(Object.keys(CATEGORIES));

function simulate() {
  for (let i = 0; i < NODES.length; i++) {
    const a = NODES[i];
    if (a.hidden || a.id === draggingNodeId) continue;
    for (let j = i + 1; j < NODES.length; j++) {
      const b = NODES[j];
      if (b.hidden) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      let d2 = dx*dx + dy*dy;
      if (d2 < SIM.minDist * SIM.minDist) d2 = SIM.minDist * SIM.minDist;
      const d = Math.sqrt(d2);
      const f = SIM.repulsion / d2;
      const fx = (dx / d) * f, fy = (dy / d) * f;
      a.vx -= fx; a.vy -= fy;
      if (b.id !== draggingNodeId) { b.vx += fx; b.vy += fy; }
    }
  }
  for (const e of EDGES) {
    const a = nodeMap.get(e.from), b = nodeMap.get(e.to);
    if (!a || !b || a.hidden || b.hidden) continue;
    const dx = b.x - a.x, dy = b.y - a.y;
    const f = SIM.attraction;
    if (a.id !== draggingNodeId) { a.vx += dx * f; a.vy += dy * f; }
    if (b.id !== draggingNodeId) { b.vx -= dx * f; b.vy -= dy * f; }
  }
  for (const n of NODES) {
    if (n.hidden) continue;
    if (n.id !== draggingNodeId) {
      n.vx -= n.x * SIM.centerForce;
      n.vy -= n.y * SIM.centerForce;
      n.vx *= SIM.damping; n.vy *= SIM.damping;
      n.x += n.vx; n.y += n.vy;
    }
  }
}

function worldToScreen(x, y) { return { x: (x - camera.x) * camera.zoom + window.innerWidth / 2, y: (y - camera.y) * camera.zoom + window.innerHeight / 2 }; }
function screenToWorld(x, y) { return { x: (x - window.innerWidth / 2) / camera.zoom + camera.x, y: (y - window.innerHeight / 2) / camera.zoom + camera.y }; }
function getNodeAt(sx, sy) {
  for (let i = NODES.length - 1; i >= 0; i--) {
    const n = NODES[i];
    if (n.hidden) continue;
    const s = worldToScreen(n.x, n.y);
    const r = n.size * camera.zoom;
    const dx = sx - s.x, dy = sy - s.y;
    if (dx*dx + dy*dy <= r * r) return n;
  }
  return null;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}
function hexToRgba(hex, alpha) {
  const c = hex.replace('#', '');
  return `rgba(${parseInt(c.substr(0,2),16)}, ${parseInt(c.substr(2,2),16)}, ${parseInt(c.substr(4,2),16)}, ${alpha})`;
}

let frame = 0;
function draw() {
  frame++;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  const gridSize = 40 * camera.zoom;
  if (gridSize > 8) {
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 1;
    const ox = (window.innerWidth / 2 - camera.x * camera.zoom) % gridSize;
    const oy = (window.innerHeight / 2 - camera.y * camera.zoom) % gridSize;
    ctx.beginPath();
    for (let x = ox; x < window.innerWidth; x += gridSize) { ctx.moveTo(x, 0); ctx.lineTo(x, window.innerHeight); }
    for (let y = oy; y < window.innerHeight; y += gridSize) { ctx.moveTo(0, y); ctx.lineTo(window.innerWidth, y); }
    ctx.stroke();
  }

  // Edges
  for (const e of EDGES) {
    const a = nodeMap.get(e.from), b = nodeMap.get(e.to);
    if (!a || !b || a.hidden || b.hidden) continue;
    const sa = worldToScreen(a.x, a.y), sb = worldToScreen(b.x, b.y);
    const isFocused = focusedNodeId && (e.from === focusedNodeId || e.to === focusedNodeId);
    const isHover = hoveredNodeId && (e.from === hoveredNodeId || e.to === hoveredNodeId);

    ctx.lineWidth = isFocused ? 2 : (isHover ? 1.5 : 1);
    // Edges entre categorías distintas con color especial (shared connections)
    if ((a.cat === 'cmc' && b.cat === 'meulen') || (a.cat === 'meulen' && b.cat === 'cmc')) {
      ctx.strokeStyle = isFocused ? 'rgba(74, 222, 128, 0.8)' : 'rgba(74, 222, 128, 0.2)';
    } else if (a.cat === 'shared' || b.cat === 'shared') {
      ctx.strokeStyle = isFocused ? 'rgba(74, 222, 128, 0.7)' : (isHover ? 'rgba(74, 222, 128, 0.3)' : 'rgba(255, 255, 255, 0.08)');
    } else {
      ctx.strokeStyle = isFocused ? 'rgba(168, 130, 255, 0.7)' : (isHover ? 'rgba(255, 255, 255, 0.3)' : 'rgba(255, 255, 255, 0.08)');
    }
    ctx.beginPath(); ctx.moveTo(sa.x, sa.y); ctx.lineTo(sb.x, sb.y); ctx.stroke();

    if (isFocused) {
      for (let i = 0; i < 3; i++) {
        const t = ((frame / 60) + i / 3) % 1;
        const px = sa.x + (sb.x - sa.x) * t;
        const py = sa.y + (sb.y - sa.y) * t;
        ctx.fillStyle = CATEGORIES[a.cat].color;
        ctx.beginPath(); ctx.arc(px, py, 2.2, 0, Math.PI * 2); ctx.fill();
      }
      if (e.label) {
        const mx = (sa.x + sb.x) / 2, my = (sa.y + sb.y) / 2;
        ctx.font = '10px Inter';
        const w = ctx.measureText(e.label).width + 12;
        ctx.fillStyle = 'rgba(26, 26, 30, 0.9)';
        ctx.strokeStyle = 'rgba(168, 130, 255, 0.3)';
        ctx.lineWidth = 1;
        roundRect(ctx, mx - w/2, my - 8, w, 16, 8);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#c4b2ff';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(e.label, mx, my);
      }
    }
  }

  // Nodes
  for (const n of NODES) {
    if (n.hidden) continue;
    const s = worldToScreen(n.x, n.y);
    const r = n.size * camera.zoom;
    const color = CATEGORIES[n.cat].color;
    const isFocused = n.id === focusedNodeId;
    const isHover = n.id === hoveredNodeId;
    const isHub = n.id === 'cmc-hub' || n.id === 'meulen-hub';

    if (isFocused || isHover || isHub) {
      const grad = ctx.createRadialGradient(s.x, s.y, r, s.x, s.y, r * 2.4);
      grad.addColorStop(0, hexToRgba(color, isHub ? 0.35 : 0.45));
      grad.addColorStop(1, hexToRgba(color, 0));
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(s.x, s.y, r * 2.4, 0, Math.PI * 2); ctx.fill();
    }

    ctx.fillStyle = '#1b1b1f';
    ctx.strokeStyle = color;
    ctx.lineWidth = isFocused ? 3 : (isHub ? 2.5 : 1.5);
    ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

    ctx.font = `${r * 0.9}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(n.icon, s.x, s.y);

    ctx.font = isHub ? '700 13px Inter' : '600 11px Inter';
    ctx.fillStyle = isFocused || isHub ? '#fff' : '#e5e5e5';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    const lines = n.label.split('\n');
    lines.forEach((line, i) => ctx.fillText(line, s.x, s.y + r + 6 + i * (isHub ? 16 : 13)));

    if (n.badge && r > 14) {
      const badgeY = s.y - r - 10;
      ctx.font = '700 9px Inter';
      const bw = ctx.measureText(n.badge).width + 10;
      ctx.fillStyle = hexToRgba(n.badgeColor || color, 0.2);
      ctx.strokeStyle = hexToRgba(n.badgeColor || color, 0.5);
      ctx.lineWidth = 1;
      roundRect(ctx, s.x - bw/2, badgeY - 7, bw, 14, 7);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = n.badgeColor || color;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(n.badge, s.x, badgeY);
    }
  }
}

function loop() { simulate(); draw(); requestAnimationFrame(loop); }
loop();

// Interaction
canvas.addEventListener('mousedown', (e) => {
  const node = getNodeAt(e.clientX, e.clientY);
  lastPointer = { x: e.clientX, y: e.clientY };
  if (node) { draggingNodeId = node.id; canvas.style.cursor = 'grabbing'; }
  else { panning = true; canvas.style.cursor = 'grabbing'; }
});
canvas.addEventListener('mousemove', (e) => {
  if (draggingNodeId) {
    const n = nodeMap.get(draggingNodeId);
    n.x += (e.clientX - lastPointer.x) / camera.zoom;
    n.y += (e.clientY - lastPointer.y) / camera.zoom;
    n.vx = 0; n.vy = 0;
    lastPointer = { x: e.clientX, y: e.clientY };
  } else if (panning) {
    camera.x -= (e.clientX - lastPointer.x) / camera.zoom;
    camera.y -= (e.clientY - lastPointer.y) / camera.zoom;
    lastPointer = { x: e.clientX, y: e.clientY };
  } else {
    const node = getNodeAt(e.clientX, e.clientY);
    hoveredNodeId = node ? node.id : null;
    canvas.style.cursor = node ? 'pointer' : 'grab';
  }
});
canvas.addEventListener('mouseup', (e) => {
  const moved = Math.abs(e.clientX - lastPointer.x) > 3 || Math.abs(e.clientY - lastPointer.y) > 3;
  if (draggingNodeId && !moved) openDetail(draggingNodeId);
  else if (panning && !moved) {
    const node = getNodeAt(e.clientX, e.clientY);
    if (node) openDetail(node.id);
  }
  draggingNodeId = null; panning = false;
  canvas.style.cursor = getNodeAt(e.clientX, e.clientY) ? 'pointer' : 'grab';
});
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const zd = e.deltaY < 0 ? 1.1 : 0.9;
  const before = screenToWorld(e.clientX, e.clientY);
  camera.zoom = Math.max(0.25, Math.min(3, camera.zoom * zd));
  const after = screenToWorld(e.clientX, e.clientY);
  camera.x += before.x - after.x;
  camera.y += before.y - after.y;
  updateZoomLabel();
}, { passive: false });

// Touch
let touchState = null;
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    const t = e.touches[0];
    const node = getNodeAt(t.clientX, t.clientY);
    lastPointer = { x: t.clientX, y: t.clientY };
    if (node) draggingNodeId = node.id; else panning = true;
  } else if (e.touches.length === 2) {
    const a = e.touches[0], b = e.touches[1];
    touchState = { dist: Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY), zoom: camera.zoom };
  }
}, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && !touchState) {
    const t = e.touches[0];
    if (draggingNodeId) {
      const n = nodeMap.get(draggingNodeId);
      n.x += (t.clientX - lastPointer.x) / camera.zoom;
      n.y += (t.clientY - lastPointer.y) / camera.zoom;
      lastPointer = { x: t.clientX, y: t.clientY };
    } else if (panning) {
      camera.x -= (t.clientX - lastPointer.x) / camera.zoom;
      camera.y -= (t.clientY - lastPointer.y) / camera.zoom;
      lastPointer = { x: t.clientX, y: t.clientY };
    }
  } else if (e.touches.length === 2 && touchState) {
    const a = e.touches[0], b = e.touches[1];
    const d = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    camera.zoom = Math.max(0.25, Math.min(3, touchState.zoom * (d / touchState.dist)));
    updateZoomLabel();
  }
}, { passive: false });
canvas.addEventListener('touchend', (e) => {
  if (e.touches.length === 0) { draggingNodeId = null; panning = false; touchState = null; }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDetail();
  else if (e.key === '+' || e.key === '=') { camera.zoom = Math.min(3, camera.zoom * 1.15); updateZoomLabel(); }
  else if (e.key === '-' || e.key === '_') { camera.zoom = Math.max(0.25, camera.zoom * 0.85); updateZoomLabel(); }
  else if (e.key === '0') { camera = { x: 0, y: 0, zoom: 1 }; updateZoomLabel(); }
});

// Detail panel
const panel = document.getElementById('detail-panel');
const detailIcon = document.getElementById('detail-icon');
const detailTitle = document.getElementById('detail-title');
const detailSubtitle = document.getElementById('detail-subtitle');
const detailBody = document.getElementById('detail-body');
document.getElementById('detail-close').addEventListener('click', closeDetail);

function openDetail(nodeId) {
  const n = nodeMap.get(nodeId);
  if (!n) return;
  focusedNodeId = nodeId;
  const color = CATEGORIES[n.cat].color;
  detailIcon.textContent = n.icon;
  detailIcon.style.background = hexToRgba(color, 0.15);
  detailIcon.style.border = `1px solid ${hexToRgba(color, 0.4)}`;
  detailTitle.textContent = n.label.replace('\n', ' ');
  detailSubtitle.innerHTML = `
    ${n.badge ? `<span class="detail-badge" style="background:${hexToRgba(n.badgeColor || color, 0.15)};color:${n.badgeColor || color};border:1px solid ${hexToRgba(n.badgeColor || color, 0.4)};">${n.badge}</span>` : ''}
    <span>${CATEGORIES[n.cat].label}</span>
  `;
  let html = '';
  html += `<div class="detail-section"><h3 class="detail-section-title">Descripción</h3><p class="detail-desc">${n.desc || ''}</p></div>`;
  if (n.items && n.items.length) {
    html += `<div class="detail-section"><h3 class="detail-section-title">Detalles</h3><ul class="detail-list">`;
    for (const it of n.items) html += `<li><span>${it.icon}</span><span>${it.text}</span></li>`;
    html += `</ul></div>`;
  }
  if (n.links && n.links.length) {
    html += `<div class="detail-section"><h3 class="detail-section-title">Abrir</h3><div class="detail-link-group">`;
    for (const l of n.links) html += `<a class="detail-link ${l.kind || ''}" href="${l.href}"><span>${l.label}</span><span>→</span></a>`;
    html += `</div></div>`;
  }
  const incoming = EDGES.filter(e => e.to === nodeId);
  const outgoing = EDGES.filter(e => e.from === nodeId);
  if (incoming.length || outgoing.length) {
    html += `<div class="detail-section"><h3 class="detail-section-title">Conexiones</h3><ul class="detail-list">`;
    for (const c of incoming) { const o = nodeMap.get(c.from); if (o) html += `<li data-node="${c.from}" style="cursor:pointer;"><span>${o.icon}</span><span>${o.label.replace('\n',' ')}</span><span style="margin-left:auto;color:var(--text-dim);">←</span></li>`; }
    for (const c of outgoing) { const o = nodeMap.get(c.to);   if (o) html += `<li data-node="${c.to}" style="cursor:pointer;"><span>${o.icon}</span><span>${o.label.replace('\n',' ')}</span><span style="margin-left:auto;color:var(--text-dim);">→</span></li>`; }
    html += `</ul></div>`;
  }
  detailBody.innerHTML = html;
  panel.classList.add('open');
  detailBody.querySelectorAll('li[data-node]').forEach(el => el.addEventListener('click', () => openDetail(el.dataset.node)));
}
function closeDetail() { panel.classList.remove('open'); focusedNodeId = null; }

// Controls
function updateZoomLabel() { document.getElementById('zoom-label').textContent = Math.round(camera.zoom * 100) + '%'; }
document.getElementById('zoom-in').onclick = () => { camera.zoom = Math.min(3, camera.zoom * 1.2); updateZoomLabel(); };
document.getElementById('zoom-out').onclick = () => { camera.zoom = Math.max(0.25, camera.zoom * 0.8); updateZoomLabel(); };
document.getElementById('zoom-reset').onclick = () => { camera = { x: 0, y: 0, zoom: 1 }; updateZoomLabel(); };

// Filters
const filtersEl = document.getElementById('filters');
for (const [key, cat] of Object.entries(CATEGORIES)) {
  const pill = document.createElement('div');
  pill.className = 'filter-pill active';
  pill.innerHTML = `<span class="dot" style="background:${cat.color}"></span>${cat.label}`;
  pill.addEventListener('click', () => {
    if (activeFilters.has(key)) { activeFilters.delete(key); pill.classList.remove('active'); }
    else { activeFilters.add(key); pill.classList.add('active'); }
    NODES.forEach(n => n.hidden = !activeFilters.has(n.cat));
    updateStats();
  });
  filtersEl.appendChild(pill);
}

function updateStats() {
  const visibleNodes = NODES.filter(n => !n.hidden).length;
  const visibleIds = new Set(NODES.filter(n => !n.hidden).map(n => n.id));
  const visibleEdges = EDGES.filter(e => visibleIds.has(e.from) && visibleIds.has(e.to)).length;
  document.getElementById('stat-nodes').textContent = visibleNodes;
  document.getElementById('stat-edges').textContent = visibleEdges;
}
updateStats();

// Auto-abrir cmc-hub al cargar para que se vea algo
setTimeout(() => openDetail('meulen-hub'), 600);
</script>
</body>
</html>
