<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMC — Tu semana</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cmc-aqua: #4FBECE;
    --cmc-blue: #1172AB;
    --cmc-navy: #0F3F68;
    --cmc-navy-xs: rgba(15,63,104,.06);
    --cmc-navy-sm: rgba(15,63,104,.12);
    --cmc-navy-md: rgba(15,63,104,.20);
    --cmc-text: #1a2e3d;
    --cmc-muted: rgba(26,46,61,.55);
    --cmc-bg: #f5f8fb;
    --cmc-green: #2d7a4f;
    --cmc-green-bg: #e8f5ee;
    --cmc-red: #8a2418;
    --cmc-red-bg: #fdecea;
    --cmc-amber: #8a5c00;
    --cmc-amber-bg: #fef3dc;
  }
  * { box-sizing: border-box; }
  body { font-family: 'Montserrat', sans-serif; background: var(--cmc-bg); color: var(--cmc-text); margin: 0; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  /* Cards */
  .card { background: white; border-radius: 10px; box-shadow: 0 1px 3px var(--cmc-navy-sm), 0 0 0 1px var(--cmc-navy-xs); padding: 20px 24px; }
  .card-hero { background: linear-gradient(135deg, var(--cmc-navy) 0%, var(--cmc-blue) 100%); color: white; border-radius: 10px; padding: 28px 28px 24px; }

  /* KPI */
  .kpi-num { font-size: 32px; font-weight: 700; line-height: 1; color: var(--cmc-navy); }
  .kpi-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--cmc-aqua); margin-bottom: 6px; }
  .kpi-sub { font-size: 11px; color: var(--cmc-muted); margin-top: 4px; }
  .kpi-delta-pos { font-size: 11px; font-weight: 600; color: var(--cmc-green); background: var(--cmc-green-bg); padding: 2px 7px; border-radius: 20px; display: inline-block; margin-top: 4px; }
  .kpi-delta-neg { font-size: 11px; font-weight: 600; color: var(--cmc-red); background: var(--cmc-red-bg); padding: 2px 7px; border-radius: 20px; display: inline-block; margin-top: 4px; }
  .kpi-delta-neu { font-size: 11px; font-weight: 600; color: var(--cmc-muted); background: var(--cmc-navy-xs); padding: 2px 7px; border-radius: 20px; display: inline-block; margin-top: 4px; }

  /* Section labels */
  .sec-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--cmc-aqua); margin-bottom: 6px; }
  .sec-title { font-size: 22px; font-weight: 700; color: var(--cmc-navy); margin-bottom: 16px; line-height: 1.15; }

  /* Progress bar */
  .prog-track { background: var(--cmc-navy-xs); border-radius: 4px; height: 8px; width: 100%; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--cmc-aqua), var(--cmc-blue)); transition: width .4s ease; }

  /* Action card */
  .action-card { border-left: 3px solid var(--cmc-aqua); background: white; border-radius: 0 8px 8px 0; padding: 12px 16px; box-shadow: 0 1px 3px var(--cmc-navy-xs); }
  .action-card.urgente { border-left-color: var(--cmc-red); }
  .action-card.neutro { border-left-color: var(--cmc-muted); }

  /* Ranking badge */
  .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; font-weight: 700; font-size: 14px; }
  .rank-1 { background: #FEF3DC; color: #8a5c00; }
  .rank-2 { background: #e8f5ee; color: #2d7a4f; }
  .rank-other { background: var(--cmc-navy-xs); color: var(--cmc-navy); }

  /* NPS gauge */
  .nps-ring { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
  .nps-ring svg { transform: rotate(-90deg); }
  .nps-ring .nps-val { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: var(--cmc-navy); }
  .nps-ring .nps-unit { font-size: 9px; color: var(--cmc-muted); margin-top: -2px; }

  /* Heatmap calendar */
  .calday { width: 30px; height: 30px; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 10px; line-height: 1.1; }
  .calday-empty { background: var(--cmc-navy-xs); opacity: .3; }

  /* No-show pill */
  .pill-stat { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }

  /* Error / loading states */
  .state-loading { text-align: center; padding: 60px 20px; color: var(--cmc-muted); }
  .state-error { text-align: center; padding: 40px 20px; color: var(--cmc-red); }

  /* Topbar */
  .topbar { background: white; border-bottom: 1px solid var(--cmc-navy-xs); position: sticky; top: 0; z-index: 50; }
</style>
</head>
<body>

<!-- Topbar -->
<nav class="topbar">
  <div class="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
      <rect width="24" height="24" rx="5" fill="#0F3F68"/>
      <path d="M12 5v14M5 12h14" stroke="#4FBECE" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span style="font-weight:700;font-size:15px;color:var(--cmc-navy)">Centro Médico Carampangue</span>
    <span class="mono" style="font-size:10px;color:var(--cmc-muted);margin-left:auto" id="labelPeriodo">cargando...</span>
  </div>
</nav>

<main class="max-w-3xl mx-auto px-4 py-8" id="mainContent">
  <div class="state-loading" id="loadingState">
    <p class="mono text-sm" style="color:var(--cmc-muted)">Cargando tu dashboard...</p>
  </div>
</main>

<template id="tplDashboard">

<!-- Hero header -->
<div class="card-hero mb-6">
  <p class="mono" style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(79,190,206,.8);margin-bottom:8px" id="hLabelMes">—</p>
  <h1 style="font-size:28px;font-weight:700;margin:0 0 4px" id="hNombre">—</h1>
  <p style="font-size:14px;opacity:.75;margin:0" id="hEspecialidad">—</p>
  <div class="mt-4 pt-4" style="border-top:1px solid rgba(255,255,255,.15)">
    <p style="font-size:12px;opacity:.65;margin:0" id="hSubtitle">Tu resumen del mes.</p>
  </div>
</div>

<!-- KPIs principales -->
<section class="mb-6">
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
    <div class="card">
      <div class="kpi-label">Atenciones mes</div>
      <div class="kpi-num" id="kpiAtend">—</div>
      <div id="kpiAtendDelta" class="kpi-delta-neu mt-1">—</div>
      <div class="kpi-sub">vs mismo mes año ant.</div>
    </div>
    <div class="card">
      <div class="kpi-label">Promedio centro</div>
      <div class="kpi-num" id="kpiPromCentro">—</div>
      <div class="kpi-sub">atend/mes · tu especialidad</div>
    </div>
    <div class="card">
      <div class="kpi-label">No-shows</div>
      <div class="kpi-num" id="kpiNoshow">—</div>
      <div id="kpiNoshowPct" class="kpi-delta-neu mt-1">—</div>
      <div class="kpi-sub">del total citados este mes</div>
    </div>
    <div class="card">
      <div class="kpi-label">Utiliz. agenda</div>
      <div class="kpi-num" id="kpiUtil">—</div>
      <div class="kpi-sub" id="kpiUtilSub">slots ocupados / total</div>
    </div>
  </div>
</section>

<!-- Ingreso estimado (opcional) -->
<section class="mb-6" id="secIngreso" style="display:none">
  <div class="card" style="border-left:4px solid var(--cmc-blue)">
    <div class="kpi-label">Ingreso estimado del mes</div>
    <div class="kpi-num" style="color:var(--cmc-blue)" id="kpiIngreso">—</div>
    <div class="kpi-sub mt-1">Basado en CAJA REAL · fuente: Medilink Cajas</div>
  </div>
</section>

<!-- Utilización visual -->
<section class="mb-6">
  <div class="card">
    <div class="sec-label">Ocupacion de agenda</div>
    <div class="flex items-center justify-between mb-2">
      <span style="font-size:14px;font-weight:600;color:var(--cmc-navy)" id="lblUtilPct">—</span>
      <span class="mono" style="font-size:11px;color:var(--cmc-muted)" id="lblUtilSlots">— / — slots</span>
    </div>
    <div class="prog-track">
      <div class="prog-fill" id="progUtil" style="width:0%"></div>
    </div>
    <p style="font-size:11px;color:var(--cmc-muted);margin-top:8px" id="lblUtilMeta">—</p>
  </div>
</section>

<!-- Atenciones mes actual vs año anterior -->
<section class="mb-6">
  <div class="card">
    <div class="sec-label">Tendencia</div>
    <div class="sec-title" style="margin-bottom:12px">Tus atenciones mes a mes.</div>
    <canvas id="chartTendencia" height="140"></canvas>
    <p style="font-size:11px;color:var(--cmc-muted);margin-top:8px">Barras = mes actual · Línea = mismo mes año anterior</p>
  </div>
</section>

<!-- NPS + Ranking lado a lado -->
<section class="mb-6 grid md:grid-cols-2 gap-4">

  <!-- NPS -->
  <div class="card">
    <div class="sec-label">Satisfaccion pacientes</div>
    <div class="sec-title" style="margin-bottom:16px">NPS de tus pacientes.</div>
    <div class="flex items-center gap-5">
      <div class="nps-ring" id="npsRing">
        <svg viewBox="0 0 90 90" width="90" height="90">
          <circle cx="45" cy="45" r="35" fill="none" stroke="var(--cmc-navy-xs)" stroke-width="9"/>
          <circle cx="45" cy="45" r="35" fill="none" stroke="var(--cmc-aqua)" stroke-width="9"
                  stroke-dasharray="219.9" stroke-dashoffset="219.9"
                  id="npsArc" stroke-linecap="round"/>
        </svg>
        <div class="nps-val"><span id="npsVal">—</span><span class="nps-unit">NPS</span></div>
      </div>
      <div>
        <div style="font-size:12px;color:var(--cmc-muted);margin-bottom:6px"><span id="npsMejor" style="color:var(--cmc-green);font-weight:600">—</span> respondieron <strong>Mejor</strong></div>
        <div style="font-size:12px;color:var(--cmc-muted);margin-bottom:6px"><span id="npsIgual" style="font-weight:600">—</span> respondieron <strong>Igual</strong></div>
        <div style="font-size:12px;color:var(--cmc-muted);margin-bottom:6px"><span id="npsPeror" style="color:var(--cmc-red);font-weight:600">—</span> respondieron <strong>Peor</strong></div>
        <div class="mono" style="font-size:10px;color:var(--cmc-muted);margin-top:8px" id="npsBase">— respuestas totales</div>
      </div>
    </div>
    <p style="font-size:11px;color:var(--cmc-muted);margin-top:12px">NPS = % Mejor − % Peor sobre respuestas post-consulta recibidas por WhatsApp.</p>
  </div>

  <!-- Ranking -->
  <div class="card">
    <div class="sec-label">Posicion en tu especialidad</div>
    <div class="sec-title" style="margin-bottom:16px">Tu lugar este mes.</div>
    <div class="flex items-center gap-4 mb-4">
      <div class="rank-badge" id="rankBadge">—</div>
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--cmc-navy)" id="rankTexto">—</div>
        <div style="font-size:12px;color:var(--cmc-muted)" id="rankEsp">—</div>
      </div>
    </div>
    <div class="prog-track mb-1">
      <div class="prog-fill" id="progRank" style="width:0%"></div>
    </div>
    <p style="font-size:11px;color:var(--cmc-muted);margin-top:6px" id="rankSub">—</p>
    <p style="font-size:11px;color:var(--cmc-muted);margin-top:8px">La posicion es anonima: solo ves tu lugar, no los datos de tus colegas.</p>
  </div>
</section>

<!-- Calendario heatmap del mes -->
<section class="mb-6">
  <div class="card">
    <div class="sec-label">Dias trabajados</div>
    <div class="sec-title" style="margin-bottom:12px">Tu calendario.</div>
    <div id="heatmapCal"></div>
    <div class="flex gap-3 mt-3 flex-wrap" style="font-size:11px;color:var(--cmc-muted)">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#2d7a4f;margin-right:4px"></span>Sobre objetivo</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#e8f5ee;border:1px solid #2d7a4f;margin-right:4px"></span>Bajo objetivo</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--cmc-navy-xs);margin-right:4px"></span>Sin atencion</span>
    </div>
  </div>
</section>

<!-- Acciones sugeridas -->
<section class="mb-8">
  <div class="sec-label">Para esta semana</div>
  <div class="sec-title">3 acciones concretas.</div>
  <div class="flex flex-col gap-3" id="accionesList"></div>
</section>

<!-- Footer -->
<footer style="text-align:center;padding:24px 0 40px;border-top:1px solid var(--cmc-navy-xs)">
  <p class="mono" style="font-size:10px;color:var(--cmc-muted)">Centro Médico Carampangue · dashboard generado automaticamente · <span id="footerFecha">—</span></p>
  <p style="font-size:11px;color:var(--cmc-muted);margin-top:4px">Consultas a recepcion: (44) 296 5226</p>
</footer>

</template>

<script>
const clp = n => n == null ? "—" : "$" + Math.round(n).toLocaleString("es-CL");
const monedaK = n => n == null ? "—" : "$" + Math.round(n/1000).toLocaleString("es-CL") + "K";
const pct = (n, d) => d ? Math.round(100*n/d) + "%" : "—";

// Leer token desde URL
const params = new URLSearchParams(window.location.search);
const TOKEN = params.get("token") || "";

async function loadDashboard() {
  if (!TOKEN) {
    showError("Link invalido. Cada profesional recibe su propio link semanal.");
    return;
  }

  let data;
  try {
    const r = await fetch(`/api/profesional/dashboard?token=${encodeURIComponent(TOKEN)}`);
    if (r.status === 401 || r.status === 403) { showError("Link invalido o expirado."); return; }
    if (!r.ok) { showError(`Error del servidor (${r.status}).`); return; }
    data = await r.json();
  } catch(e) {
    showError("No se pudo conectar al servidor.");
    return;
  }

  // Inyectar template
  const tpl = document.getElementById("tplDashboard");
  const content = tpl.content.cloneNode(true);
  const main = document.getElementById("mainContent");
  main.innerHTML = "";
  main.appendChild(content);

  renderDashboard(data);
}

function showError(msg) {
  document.getElementById("mainContent").innerHTML = `
    <div class="state-error">
      <p style="font-weight:600;margin-bottom:8px">No se pudo cargar el dashboard</p>
      <p class="mono" style="font-size:12px">${msg}</p>
    </div>`;
}

function renderDashboard(d) {
  const k = d.kpis || {};
  const mes = d.mes_label || "";
  const nombre = d.nombre || "Profesional";
  const esp = d.especialidad || "";

  // Topbar
  document.getElementById("labelPeriodo").textContent = mes;

  // Hero
  document.getElementById("hLabelMes").textContent = "Tu resumen · " + mes;
  document.getElementById("hNombre").textContent = nombre;
  document.getElementById("hEspecialidad").textContent = esp;
  document.getElementById("hSubtitle").textContent =
    `${k.atend_mes || 0} atenciones este mes · ${k.dias_trabajados || 0} dias trabajados`;

  // KPIs
  setText("kpiAtend", k.atend_mes ?? "—");

  const deltaAnio = k.atend_mes_anio_anterior != null && k.atend_mes != null
    ? k.atend_mes - k.atend_mes_anio_anterior : null;
  renderDelta("kpiAtendDelta", deltaAnio, k.atend_mes_anio_anterior,
    k.atend_mes_anio_anterior != null ? "vs " + k.atend_mes_anio_anterior + " (año ant.)" : "sin dato año anterior");

  setText("kpiPromCentro", k.prom_especialidad ?? "—");
  setText("kpiNoshow", k.noshows ?? "—");

  const nshPct = k.noshows != null && k.citados_mes
    ? Math.round(100*k.noshows/k.citados_mes) : null;
  if (nshPct != null) {
    const el = document.getElementById("kpiNoshowPct");
    el.textContent = nshPct + "% de no-shows";
    el.className = nshPct > 20 ? "kpi-delta-neg mt-1" : nshPct > 10 ? "kpi-delta-neu mt-1" : "kpi-delta-pos mt-1";
  }

  const util = k.slots_ocupados != null && k.slots_total
    ? Math.round(100*k.slots_ocupados/k.slots_total) : null;
  setText("kpiUtil", util != null ? util + "%" : "—");
  setText("kpiUtilSub", k.slots_ocupados != null ? `${k.slots_ocupados} / ${k.slots_total} slots` : "sin dato");

  // Ingreso
  if (k.ingreso_mes != null) {
    document.getElementById("secIngreso").style.display = "";
    document.getElementById("kpiIngreso").textContent = monedaK(k.ingreso_mes);
  }

  // Barra utilización
  if (util != null) {
    document.getElementById("lblUtilPct").textContent = util + "% de ocupacion";
    document.getElementById("lblUtilSlots").textContent = `${k.slots_ocupados} / ${k.slots_total} slots`;
    document.getElementById("progUtil").style.width = Math.min(util, 100) + "%";
    const meta = k.slots_total > 0
      ? (util >= 80 ? "Excelente ocupacion este mes." : util >= 60 ? "Buena ocupacion — hay margen para crecer." : "Agenda con capacidad disponible.")
      : "";
    document.getElementById("lblUtilMeta").textContent = meta;
  }

  // Tendencia chart
  renderChartTendencia(d.tendencia || {});

  // NPS
  renderNPS(d.nps || {});

  // Ranking
  renderRanking(d.ranking || {}, esp);

  // Heatmap
  renderHeatmap(d.por_dia || {}, k.atend_avg_dia || 10);

  // Acciones
  renderAcciones(d.acciones || []);

  // Footer
  document.getElementById("footerFecha").textContent =
    new Date().toLocaleDateString("es-CL", {day:"2-digit",month:"long",year:"numeric"});
}

function setText(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

function renderDelta(id, delta, base, label) {
  const el = document.getElementById(id);
  if (!el) return;
  if (delta == null) { el.textContent = label || "sin dato"; el.className = "kpi-delta-neu mt-1"; return; }
  const sign = delta > 0 ? "+" : "";
  const pctStr = base ? ` (${delta > 0?"+":""}${Math.round(100*delta/base)}%)` : "";
  el.textContent = `${sign}${delta} vs año ant.${pctStr}`;
  el.className = delta > 0 ? "kpi-delta-pos mt-1" : delta < 0 ? "kpi-delta-neg mt-1" : "kpi-delta-neu mt-1";
}

function renderChartTendencia(tendencia) {
  // tendencia = { meses: ["2025-04","2025-05",...], actual: [N,...], anterior: [N,...] }
  const ctx = document.getElementById("chartTendencia");
  if (!ctx) return;
  const meses = tendencia.meses || [];
  const actual = tendencia.actual || [];
  const anterior = tendencia.anterior || [];
  const labels = meses.map(m => {
    const [y, mo] = m.split("-");
    const nombres = ["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    return nombres[parseInt(mo)] + " " + y.slice(2);
  });
  if (window._chTend) window._chTend.destroy();
  window._chTend = new Chart(ctx, {
    type: "bar",
    data: {
      labels,
      datasets: [
        { label: "Este año", data: actual, backgroundColor: "rgba(17,114,171,.8)", borderRadius: 3, yAxisID: "y" },
        { label: "Año anterior", data: anterior, type: "line", borderColor: "#4FBECE",
          backgroundColor: "transparent", borderWidth: 2, pointRadius: 3, tension: .25, yAxisID: "y" },
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { font: { family: "IBM Plex Mono", size: 10 }, boxWidth: 12 } } },
      scales: {
        y: { beginAtZero: true, grid: { color: "rgba(15,63,104,.06)" },
             ticks: { font: { family: "IBM Plex Mono", size: 10 } } },
        x: { ticks: { font: { family: "IBM Plex Mono", size: 10 } } }
      }
    }
  });
}

function renderNPS(nps) {
  // nps = { nps: 72, total: 18, mejor: 14, igual: 3, peor: 1 }
  const val = nps.nps ?? null;
  const total = nps.total || 0;
  if (val == null || total === 0) {
    document.getElementById("npsVal").textContent = "—";
    document.getElementById("npsBase").textContent = "Sin respuestas aun";
    return;
  }
  document.getElementById("npsVal").textContent = val > 0 ? "+" + val : val;
  document.getElementById("npsMejor").textContent = nps.mejor ?? 0;
  document.getElementById("npsIgual").textContent = nps.igual ?? 0;
  document.getElementById("npsPeror").textContent = nps.peor ?? 0;
  document.getElementById("npsBase").textContent = total + " respuestas totales";

  // Arc: NPS range [-100, +100] → map to 0–100%
  const pctArc = Math.max(0, Math.min(100, (val + 100) / 2));
  const circumference = 2 * Math.PI * 35; // r=35
  const offset = circumference * (1 - pctArc / 100);
  const arc = document.getElementById("npsArc");
  if (arc) {
    arc.setAttribute("stroke-dasharray", circumference.toFixed(1));
    arc.setAttribute("stroke-dashoffset", offset.toFixed(1));
    arc.setAttribute("stroke", val >= 50 ? "#2d7a4f" : val >= 0 ? "#4FBECE" : "#8a2418");
  }
}

function renderRanking(ranking, esp) {
  // ranking = { posicion: 1, total: 3, pct_ile: 85, atend_mes: 87 }
  const pos = ranking.posicion;
  const total = ranking.total;
  if (!pos || !total) {
    document.getElementById("rankTexto").textContent = "Sin dato";
    document.getElementById("rankEsp").textContent = esp;
    document.getElementById("rankSub").textContent = "No hay suficientes datos para calcular ranking.";
    return;
  }
  const badge = document.getElementById("rankBadge");
  badge.textContent = "#" + pos;
  badge.className = "rank-badge " + (pos === 1 ? "rank-1" : pos === 2 ? "rank-2" : "rank-other");

  const textos = ["Primer lugar", "Segundo lugar", "Tercer lugar"];
  document.getElementById("rankTexto").textContent = pos <= 3 ? textos[pos-1] : `Lugar ${pos} de ${total}`;
  document.getElementById("rankEsp").textContent = `en ${esp} · ${total} profesionales`;

  const pct = Math.round(100 * (total - pos + 1) / total);
  document.getElementById("progRank").style.width = pct + "%";
  document.getElementById("rankSub").textContent = `Estas en el percentil ${pct} de tu especialidad este mes.`;
}

function renderHeatmap(porDia, objetivo) {
  const cont = document.getElementById("heatmapCal");
  if (!cont) return;
  const dias = Object.keys(porDia).sort();
  if (!dias.length) { cont.innerHTML = "<p style='font-size:12px;color:var(--cmc-muted)'>Sin datos de dias trabajados.</p>"; return; }

  // Agrupar por mes
  const byMonth = {};
  dias.forEach(f => { const m = f.slice(0,7); (byMonth[m] = byMonth[m]||[]).push(f); });

  const MESES = ["","Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  let html = '<div class="grid md:grid-cols-2 gap-6">';
  Object.keys(byMonth).sort().slice(-3).forEach(m => {
    const [y, mo] = m.split("-");
    html += `<div><div class="mono" style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cmc-aqua);margin-bottom:8px">${MESES[parseInt(mo)]} ${y}</div>`;
    html += '<div style="display:grid;grid-template-columns:repeat(7,30px);gap:3px">';
    ["L","M","M","J","V","S","D"].forEach(d => {
      html += `<div class="mono" style="font-size:9px;text-align:center;color:var(--cmc-muted)">${d}</div>`;
    });
    const first = new Date(byMonth[m][0]+"T12:00");
    const startDow = (first.getDay() + 6) % 7;
    for (let i=0; i<startDow; i++) html += "<div></div>";

    byMonth[m].forEach(f => {
      const n = porDia[f] || 0;
      const dow = (new Date(f+"T12:00").getDay()+6)%7;
      if (dow === 6) { html += '<div class="calday calday-empty"></div>'; return; }
      let bg, tc;
      if (n === 0) { bg = "var(--cmc-navy-xs)"; tc = "color:var(--cmc-muted)"; }
      else if (n >= objetivo) { bg = n >= objetivo*1.5 ? "#2d7a4f" : "#5fa858"; tc = "color:white"; }
      else { bg = "#fdecea"; tc = "color:var(--cmc-red)"; }
      html += `<div class="calday" style="background:${bg};${tc}" title="${f}: ${n} atenciones">
        <span style="font-size:11px;font-weight:600">${n||"·"}</span>
      </div>`;
    });
    html += "</div></div>";
  });
  html += "</div>";
  cont.innerHTML = html;
}

function renderAcciones(acciones) {
  const cont = document.getElementById("accionesList");
  if (!cont) return;
  if (!acciones.length) {
    cont.innerHTML = "<p style='font-size:12px;color:var(--cmc-muted)'>Sin acciones sugeridas esta semana.</p>";
    return;
  }
  cont.innerHTML = acciones.map((a, i) => {
    const cls = a.tipo === "urgente" ? "urgente" : a.tipo === "info" ? "neutro" : "";
    return `<div class="action-card ${cls}">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div class="rank-badge ${i===0?'rank-1':i===1?'rank-2':'rank-other'}" style="width:26px;height:26px;font-size:12px;flex-shrink:0;margin-top:1px">${i+1}</div>
        <div>
          <div style="font-weight:600;font-size:13px;color:var(--cmc-navy);margin-bottom:2px">${a.titulo}</div>
          <div style="font-size:12px;color:var(--cmc-muted)">${a.descripcion}</div>
        </div>
      </div>
    </div>`;
  }).join("");
}

loadDashboard();
