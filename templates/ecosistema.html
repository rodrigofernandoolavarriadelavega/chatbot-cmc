<html lang="es">
<head>
<meta charset="UTF-8">

<style>
:root {
  --bg: #191919; --bg-lighter: #1e1e1e; --bg-panel: #252525;
  --border: #333; --border-light: #444;
  --text: #dcddde; --text-dim: #999; --text-muted: #666;
  --accent: #a882ff; --accent-dim: rgba(168,130,255,.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: "Inter", -apple-system, system-ui, sans-serif;
  overflow: hidden; height: 100vh; width: 100vw;
  -webkit-font-smoothing: antialiased;
  cursor: grab;
}
body.dragging { cursor: grabbing; }

canvas { display: block; position: absolute; top: 0; left: 0; }

/* ── Overlay header ──────────────────────── */
.overlay-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  padding: 16px 24px; display: flex; align-items: center; gap: 12px;
  background: linear-gradient(180deg, rgba(25,25,25,.95) 0%, rgba(25,25,25,.7) 70%, transparent 100%);
  pointer-events: none;
}
.overlay-header > * { pointer-events: auto; }
.overlay-header img { height: 32px; border-radius: 8px; }
.overlay-header h1 {
  font-size: 16px; font-weight: 700; color: var(--text);
  letter-spacing: -.3px;
}
.overlay-header .sub {
  font-size: 11px; color: var(--text-muted); font-weight: 400;
  margin-left: 4px;
}
.live-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; color: #4ade80;
  background: rgba(74,222,128,.1); padding: 3px 10px; border-radius: 20px;
  margin-left: auto; text-transform: uppercase; letter-spacing: .5px;
}
.live-badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: #4ade80; animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; box-shadow: 0 0 4px #4ade80; }
  50% { opacity: .4; box-shadow: 0 0 8px #4ade80; }
}

/* ── Controls ─────────────────────────────── */
.controls {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; gap: 6px; align-items: center;
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 6px 10px;
}
.controls button {
  background: none; border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 6px; width: 32px; height: 32px; font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s, border-color .15s;
}
.controls button:hover {
  background: var(--accent-dim); color: var(--accent); border-color: var(--accent);
}
.controls .zoom-label {
  font-size: 11px; color: var(--text-muted); min-width: 40px;
  text-align: center; font-weight: 600; font-variant-numeric: tabular-nums;
}
.controls .sep {
  width: 1px; height: 20px; background: var(--border); margin: 0 4px;
}

/* ── Filter pills ─────────────────────────── */
.filters {
  position: fixed; top: 64px; left: 24px; z-index: 10;
  display: flex; flex-wrap: wrap; gap: 6px; max-width: 500px;
  pointer-events: none;
}
.filters > * { pointer-events: auto; }
.filter-pill {
  font-size: 11px; font-weight: 600; padding: 4px 12px;
  border-radius: 20px; cursor: pointer; border: 1px solid transparent;
  transition: all .15s; user-select: none; letter-spacing: .2px;
}
.filter-pill.active { border-color: currentColor; }
.filter-pill:not(.active) { opacity: .5; }
.filter-pill:hover { opacity: 1; }

/* ── Detail panel ─────────────────────────── */
.detail-panel {
  position: fixed; top: 60px; right: 20px; z-index: 20;
  width: 320px; max-height: calc(100vh - 100px);
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: 14px; padding: 0; overflow: hidden;
  opacity: 0; transform: translateX(20px) scale(.97);
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  box-shadow: 0 16px 48px rgba(0,0,0,.5);
}
.detail-panel.visible {
  opacity: 1; transform: translateX(0) scale(1);
  pointer-events: auto;
}
.detail-header {
  padding: 16px 18px; display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.detail-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.detail-title { font-size: 14px; font-weight: 700; }
.detail-badge {
  font-size: 9px; font-weight: 700; padding: 2px 8px;
  border-radius: 20px; margin-left: auto; text-transform: uppercase;
  letter-spacing: .5px;
}
.detail-close {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none; color: var(--text-muted);
  font-size: 18px; cursor: pointer; width: 28px; height: 28px;
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
}
.detail-close:hover { background: rgba(255,255,255,.05); color: var(--text); }
.detail-body {
  padding: 14px 18px; overflow-y: auto;
  max-height: calc(100vh - 200px);
}
.detail-desc {
  font-size: 12px; color: var(--text-dim); line-height: 1.6;
  margin-bottom: 14px;
}
.detail-items { list-style: none; }
.detail-items li {
  font-size: 12px; color: var(--text-dim); padding: 6px 0;
  border-top: 1px solid rgba(255,255,255,.04);
  display: flex; align-items: center; gap: 8px;
}
.detail-items li:first-child { border-top: none; }
.detail-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.detail-connections {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--border);
}
.detail-connections h4 {
  font-size: 10px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}
.detail-conn-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-dim); padding: 4px 0;
}
.detail-conn-arrow { color: var(--text-muted); font-size: 10px; }
.detail-url {
  display: inline-block; font-size: 11px; color: var(--accent);
  background: var(--accent-dim); padding: 4px 12px; border-radius: 6px;
  margin-top: 12px; text-decoration: none; font-weight: 500;
  word-break: break-all; transition: background .15s;
}
.detail-url:hover { background: rgba(168,130,255,.25); }

/* ── Stats bottom-left ───────────────────── */
.stats-overlay {
  position: fixed; bottom: 20px; left: 20px; z-index: 10;
  display: flex; flex-direction: column; gap: 4px;
  font-size: 11px; color: var(--text-muted); font-weight: 500;
  font-variant-numeric: tabular-nums;

.stats-overlay span { display: flex; align-items: center; gap: 6px; }
.stats-overlay .val { color: var(--text-dim); font-weight: 600; }

/* ── Responsive ──────────────────────────── */
@media (max-width: 768px) {
  .detail-panel { right: 10px; left: 10px; width: auto; top: auto; bottom: 70px; max-height: 50vh; }
  .filters { top: 56px; left: 12px; }
  .overlay-header { padding: 12px 16px; }
  .overlay-header h1 { font-size: 14px; }
}
</style>

const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

let camera = { x: 0, y: 0, zoom: 1 };
let nodes = [], edges = [];
let hoveredNode = null, selectedNode = null, dragNode = null;
let isDragging = false, isPanning = false;
let panStart = { x: 0, y: 0 }, camStart = { x: 0, y: 0 };
let activeCategories = new Set(Object.keys(CATEGORIES));
let animTime = 0;

// Initialize node positions in a circle
function initGraph() {
  const cx = 0, cy = 0;
  const R = 260;
  nodes = NODES.map((d, i) => {
    const angle = (i / NODES.length) * Math.PI * 2 - Math.PI / 2;
    return {
      ...d,
      x: cx + R * Math.cos(angle) * (0.6 + Math.random() * 0.8),
      y: cy + R * Math.sin(angle) * (0.6 + Math.random() * 0.8),
      vx: 0, vy: 0,
      targetX: 0, targetY: 0,
    };
  });
  edges = EDGES.map(e => ({
    ...e,
    source: nodes.find(n => n.id === e.from),
    target: nodes.find(n => n.id === e.to),
  })).filter(e => e.source && e.target);
}
initGraph();

// ── Force simulation ──────────────────────
const SIM = {
  repulsion: 8000,
  attraction: 0.008,
  centerForce: 0.002,
  damping: 0.85,
  minDist: 80,
};

function simulate() {
  const active = nodes.filter(n => activeCategories.has(n.cat));

  // Repulsion (all pairs)
  for (let i = 0; i < active.length; i++) {
    for (let j = i + 1; j < active.length; j++) {
      const a = active[i], b = active[j];
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx * dx + dy * dy) || 1;
      if (dist < SIM.minDist) dist = SIM.minDist;
      const force = SIM.repulsion / (dist * dist);
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      a.vx -= fx; a.vy -= fy;
      b.vx += fx; b.vy += fy;
    }
  }

  // Attraction along edges
  for (const e of edges) {
    if (!activeCategories.has(e.source.cat) || !activeCategories.has(e.target.cat)) continue;
    const dx = e.target.x - e.source.x;
    const dy = e.target.y - e.source.y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const force = (dist - 120) * SIM.attraction;
    const fx = (dx / dist) * force;
    const fy = (dy / dist) * force;
    e.source.vx += fx; e.source.vy += fy;
    e.target.vx -= fx; e.target.vy -= fy;
  }

  // Center force
  for (const n of active) {
    n.vx -= n.x * SIM.centerForce;
    n.vy -= n.y * SIM.centerForce;
  }

  // Integration
  for (const n of active) {
    if (n === dragNode) continue;
    n.vx *= SIM.damping;
    n.vy *= SIM.damping;
    n.x += n.vx;
    n.y += n.vy;
  }
}

// ── Rendering ─────────────────────────────
function worldToScreen(wx, wy) {
  return {
    x: (wx - camera.x) * camera.zoom + W / 2,
    y: (wy - camera.y) * camera.zoom + H / 2,
  };
}
function screenToWorld(sx, sy) {
  return {
    x: (sx - W / 2) / camera.zoom + camera.x,
    y: (sy - H / 2) / camera.zoom + camera.y,
  };
}

function getNodeAt(sx, sy) {
  const wp = screenToWorld(sx, sy);
  let closest = null, minD = Infinity;
  for (const n of nodes) {
    if (!activeCategories.has(n.cat)) continue;
    const dx = n.x - wp.x, dy = n.y - wp.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    const r = n.size + 8;
    if (d < r && d < minD) { closest = n; minD = d; }
  }
  return closest;
}

function draw() {
  animTime += 0.015;
  ctx.clearRect(0, 0, W, H);

  // Background subtle grid
  const gridSize = 40 * camera.zoom;
  if (gridSize > 15) {
    ctx.strokeStyle = 'rgba(255,255,255,.018)';
    ctx.lineWidth = 1;
    const offX = ((-camera.x * camera.zoom + W / 2) % gridSize + gridSize) % gridSize;
    const offY = ((-camera.y * camera.zoom + H / 2) % gridSize + gridSize) % gridSize;
    for (let x = offX; x < W; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = offY; y < H; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  const focus = hoveredNode || selectedNode;

  // ── Draw edges ──
  for (const e of edges) {
    if (!activeCategories.has(e.source.cat) || !activeCategories.has(e.target.cat)) continue;
    const s = worldToScreen(e.source.x, e.source.y);
    const t = worldToScreen(e.target.x, e.target.y);

    const isFocused = focus && (e.source === focus || e.target === focus);
    const dimmed = focus && !isFocused;

    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(t.x, t.y);

    if (isFocused) {
      const catColor = CATEGORIES[e.source.cat]?.color || '#a882ff';
      ctx.strokeStyle = catColor + '80';
      ctx.lineWidth = 2 * camera.zoom;
    } else {
      ctx.strokeStyle = dimmed ? 'rgba(255,255,255,.02)' : 'rgba(255,255,255,.07)';
      ctx.lineWidth = 1 * camera.zoom;
    }
    ctx.stroke();

    // Animated particles on focused edges
    if (isFocused) {
      const dx = t.x - s.x, dy = t.y - s.y;
      const len = Math.sqrt(dx * dx + dy * dy);
      for (let p = 0; p < 3; p++) {
        const progress = ((animTime * 0.5 + p * 0.33) % 1);
        const px = s.x + dx * progress;
        const py = s.y + dy * progress;
        ctx.beginPath();
        ctx.arc(px, py, 2 * camera.zoom, 0, Math.PI * 2);
        const catColor = CATEGORIES[e.source.cat]?.color || '#a882ff';
        ctx.fillStyle = catColor;
        ctx.fill();
      }
    }

    // Edge label on focused
    if (isFocused && e.label && camera.zoom > 0.6) {
      const mx = (s.x + t.x) / 2, my = (s.y + t.y) / 2;
      ctx.font = `${10 * camera.zoom}px Inter, system-ui`;
      ctx.fillStyle = 'rgba(255,255,255,.5)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      // background pill
      const tw = ctx.measureText(e.label).width + 10 * camera.zoom;
      const th = 16 * camera.zoom;
      ctx.fillStyle = 'rgba(25,25,25,.85)';
      ctx.beginPath();
      ctx.roundRect(mx - tw/2, my - th/2, tw, th, 4 * camera.zoom);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,.55)';
      ctx.fillText(e.label, mx, my);
    }
  }

  // ── Draw nodes ──
  for (const n of nodes) {
    if (!activeCategories.has(n.cat)) continue;
    const p = worldToScreen(n.x, n.y);
    const r = n.size * camera.zoom;
    const catColor = CATEGORIES[n.cat]?.color || '#a882ff';
    const isFocused = n === focus;
    const isConnected = focus && edges.some(e =>
      (e.source === focus && e.target === n) || (e.target === focus && e.source === n)
    );
    const dimmed = focus && !isFocused && !isConnected;

    const alpha = dimmed ? 0.12 : 1;

    // Outer glow
    if (!dimmed) {
      const grad = ctx.createRadialGradient(p.x, p.y, r * 0.5, p.x, p.y, r * 2.5);
      grad.addColorStop(0, catColor + (isFocused ? '30' : '15'));
      grad.addColorStop(1, catColor + '00');
      ctx.beginPath();
      ctx.arc(p.x, p.y, r * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Circle
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = isFocused ? catColor + '35' : `rgba(30,30,30,${alpha})`;
    ctx.fill();
    ctx.strokeStyle = dimmed ? catColor + '20' : (isFocused ? catColor : catColor + '70');
    ctx.lineWidth = isFocused ? 2.5 : 1.5;
    ctx.stroke();

    // Icon
    if (r > 8) {
      ctx.font = `${r * 0.7}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.globalAlpha = dimmed ? 0.15 : 1;
      ctx.fillText(n.icon, p.x, p.y);
      ctx.globalAlpha = 1;
    }

    // Label
    if (camera.zoom > 0.35 && !dimmed) {
      const lines = n.label.split('\n');
      const fontSize = Math.max(9, Math.min(12, 11 * camera.zoom));
      ctx.font = `600 ${fontSize}px Inter, system-ui`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle = isFocused ? '#fff' : 'rgba(220,221,222,.75)';
      lines.forEach((line, i) => {
        ctx.fillText(line, p.x, p.y + r + 6 + i * (fontSize + 2));
      });
    }
  }

  simulate();
  requestAnimationFrame(draw);
}

// ── Interaction ───────────────────────────

canvas.addEventListener('mousedown', e => {
  const n = getNodeAt(e.clientX, e.clientY);
  if (n) {
    dragNode = n;
    isDragging = true;
    document.body.classList.add('dragging');
  } else {
    isPanning = true;
    panStart = { x: e.clientX, y: e.clientY };
    camStart = { x: camera.x, y: camera.y };
    document.body.classList.add('dragging');
  }
});

canvas.addEventListener('mousemove', e => {
  if (dragNode) {
    const wp = screenToWorld(e.clientX, e.clientY);
    dragNode.x = wp.x;
    dragNode.y = wp.y;
    dragNode.vx = 0; dragNode.vy = 0;
  } else if (isPanning) {
    camera.x = camStart.x - (e.clientX - panStart.x) / camera.zoom;
    camera.y = camStart.y - (e.clientY - panStart.y) / camera.zoom;
  } else {
    const n = getNodeAt(e.clientX, e.clientY);
    if (n !== hoveredNode) {
      hoveredNode = n;
      canvas.style.cursor = n ? 'pointer' : 'grab';
    }
  }
});

window.addEventListener('mouseup', () => {
  if (dragNode && !isPanning) {
    // If we barely moved, treat as click
  }
  dragNode = null;
  isPanning = false;
  isDragging = false;
  document.body.classList.remove('dragging');
});

canvas.addEventListener('click', e => {
  const n = getNodeAt(e.clientX, e.clientY);
  if (n) {
    selectedNode = (selectedNode === n) ? null : n;
    showDetail(selectedNode);
  } else if (!isPanning) {
    selectedNode = null;
    hideDetail();
  }
});

canvas.addEventListener('dblclick', e => {
  const n = getNodeAt(e.clientX, e.clientY);
  if (n && n.url) {
    window.open(n.url, '_blank');
  }
});

// Zoom
function applyZoom(delta, cx, cy) {
  const oldZoom = camera.zoom;
  camera.zoom = Math.max(0.2, Math.min(4, camera.zoom * (1 + delta)));
  // Zoom toward cursor
  const wp = screenToWorld(cx || W/2, cy || H/2);
  camera.x += (wp.x - camera.x) * (1 - oldZoom / camera.zoom) * 0.3;
  camera.y += (wp.y - camera.y) * (1 - oldZoom / camera.zoom) * 0.3;
  updateZoomLabel();
}

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  applyZoom(e.deltaY < 0 ? 0.08 : -0.08, e.clientX, e.clientY);
}, { passive: false });

// Touch support
let touches = [];
let lastPinchDist = 0;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touches = [...e.touches];
  if (touches.length === 1) {
    const t = touches[0];
    const n = getNodeAt(t.clientX, t.clientY);
    if (n) {
      dragNode = n;
    } else {
      isPanning = true;
      panStart = { x: t.clientX, y: t.clientY };
      camStart = { x: camera.x, y: camera.y };
    }
  } else if (touches.length === 2) {
    const dx = touches[1].clientX - touches[0].clientX;
    const dy = touches[1].clientY - touches[0].clientY;
    lastPinchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const ts = [...e.touches];
  if (ts.length === 1 && dragNode) {
    const wp = screenToWorld(ts[0].clientX, ts[0].clientY);
    dragNode.x = wp.x; dragNode.y = wp.y;
    dragNode.vx = 0; dragNode.vy = 0;
  } else if (ts.length === 1 && isPanning) {
    camera.x = camStart.x - (ts[0].clientX - panStart.x) / camera.zoom;
    camera.y = camStart.y - (ts[0].clientY - panStart.y) / camera.zoom;
  } else if (ts.length === 2) {
    const dx = ts[1].clientX - ts[0].clientX;
    const dy = ts[1].clientY - ts[0].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastPinchDist) {
      const delta = (dist - lastPinchDist) * 0.003;
      const cx = (ts[0].clientX + ts[1].clientX) / 2;
      const cy = (ts[0].clientY + ts[1].clientY) / 2;
      applyZoom(delta, cx, cy);
    }
    lastPinchDist = dist;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length === 0) {
    if (dragNode) {
      // check if tap
    }
    dragNode = null; isPanning = false;
    lastPinchDist = 0;
  }
  touches = [...e.touches];
});

// ── Tap to select on touch ──
canvas.addEventListener('touchend', e => {
  if (e.changedTouches.length === 1 && !isPanning) {
    const t = e.changedTouches[0];
    const n = getNodeAt(t.clientX, t.clientY);
    if (n) {
      selectedNode = (selectedNode === n) ? null : n;
      showDetail(selectedNode);
    } else {
      selectedNode = null;
      hideDetail();
    }
  }
});

// ── Controls ──────────────────────────────
document.getElementById('btn-zoom-in').onclick = () => applyZoom(0.2);
document.getElementById('btn-zoom-out').onclick = () => applyZoom(-0.2);
document.getElementById('btn-reset').onclick = () => {
  camera = { x: 0, y: 0, zoom: 1 };
  updateZoomLabel();
};

function updateZoomLabel() {
  document.getElementById('zoom-label').textContent = Math.round(camera.zoom * 100) + '%';
}

// ── Filter pills ──────────────────────────
const filtersEl = document.getElementById('filters');
for (const [key, cat] of Object.entries(CATEGORIES)) {
  const pill = document.createElement('span');
  pill.className = 'filter-pill active';
  pill.style.color = cat.color;
  pill.style.background = cat.color + '15';
  pill.textContent = cat.label;
  pill.dataset.cat = key;
  pill.onclick = () => {
    if (activeCategories.has(key)) {
      activeCategories.delete(key);
      pill.classList.remove('active');
    } else {
      activeCategories.add(key);
      pill.classList.add('active');
    }
  };
  filtersEl.appendChild(pill);
}

// ── Detail panel ──────────────────────────
const detailPanel = document.getElementById('detail-panel');
const detailHeader = document.getElementById('detail-header');
const detailBody = document.getElementById('detail-body');

function showDetail(node) {
  if (!node) { hideDetail(); return; }
  const catColor = CATEGORIES[node.cat]?.color || '#a882ff';

  detailHeader.innerHTML = `
    <div class="detail-icon" style="background:${catColor}15">${node.icon}</div>
    <div>
      <div class="detail-title">${node.label.replace(/\n/g, ' ')}</div>
    </div>
    <span class="detail-badge" style="background:${node.badgeColor}20;color:${node.badgeColor}">${node.badge}</span>
  `;

  let html = `<div class="detail-desc">${node.desc}</div>`;

  if (node.items?.length) {
    html += '<ul class="detail-items">';
    for (const item of node.items) {
      html += `<li><span class="detail-dot" style="background:${item.dot};box-shadow:0 0 6px ${item.dot}"></span>${item.text}</li>`;
    }
    html += '</ul>';
  }

  // Connections
  const conns = edges.filter(e => e.source === node || e.target === node);
  if (conns.length) {
    html += '<div class="detail-connections"><h4>Conexiones</h4>';
    for (const e of conns) {
      const other = e.source === node ? e.target : e.source;
      const dir = e.source === node ? '\u2192' : '\u2190';
      html += `<div class="detail-conn-item">
        <span class="detail-conn-arrow">${dir}</span>
        <span>${other.icon} ${other.label.replace(/\n/g, ' ')}</span>
        <span style="margin-left:auto;color:var(--text-muted);font-size:10px">${e.label}</span>
      </div>`;
    }
    html += '</div>';
  }

  if (node.url) {
    html += `<a class="detail-url" href="${node.url}" target="_blank">${node.urlLabel || node.url}</a>`;
  }

  detailBody.innerHTML = html;
  detailPanel.classList.add('visible');
}

function hideDetail() {
  detailPanel.classList.remove('visible');
}

document.getElementById('detail-close').onclick = () => {
  selectedNode = null;
  hideDetail();
};

// ── Stats overlay ─────────────────────────
(async function loadStats() {
  const el = document.getElementById('stats-overlay');
  el.innerHTML = `
    <span><span class="val">17</span> nodos</span>
    <span><span class="val">${EDGES.length}</span> conexiones</span>
    <span><span class="val">24</span> profesionales</span>
    <span><span class="val">18</span> especialidades</span>
  `;
  try {
    const r = await fetch('/health');
    if (r.ok) {
      const d = await r.json();
      if (d.medilink_ms) {
        el.innerHTML += `<span>Medilink <span class="val" style="color:#4ade80">${d.medilink_ms}ms</span></span>`;
      }
    }
  } catch {}
})();

// ── Keyboard shortcuts ────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { selectedNode = null; hideDetail(); }
  if (e.key === '+' || e.key === '=') applyZoom(0.15);
  if (e.key === '-') applyZoom(-0.15);
  if (e.key === '0') { camera = { x: 0, y: 0, zoom: 1 }; updateZoomLabel(); }
});

// ── Start ─────────────────────────────────
draw();
</script>
</body>
