<style>
/* Centro Médico Carampangue — Design System */
:root {
  /* Brand */
  --brand-deep: #1172AB;        /* Azul corporativo */
  --brand-deep-ink: #0B4F7A;
  --brand-deep-soft: #E8F2F9;
  --brand-teal: #4FBECE;        /* Turquesa */
  --brand-teal-soft: #E6F6F8;
  --brand-teal-ink: #1F7E8C;

  /* Neutrals — cálidos y limpios */
  --ink-900: #0A1A28;
  --ink-800: #11283C;
  --ink-700: #223548;
  --ink-600: #3C5166;
  --ink-500: #5E7183;
  --ink-400: #8A97A6;
  --ink-300: #BAC4CE;
  --ink-200: #DFE5EC;
  --ink-100: #EEF2F6;
  --ink-50:  #F7F9FB;
  --paper:   #FFFFFF;

  /* Accents para acentos sutiles (dentales, kids, etc.) */
  --accent-coral: #F2825E;
  --accent-sand:  #F3E3C7;
  --accent-mint:  #B6E3D4;

  /* Tokens */
  --radius-sm: 10px;
  --radius: 16px;
  --radius-lg: 24px;
  --radius-pill: 999px;

  --shadow-sm: 0 1px 2px rgba(11, 79, 122, 0.06), 0 1px 1px rgba(11, 79, 122, 0.04);
  --shadow:    0 10px 30px -12px rgba(11, 79, 122, 0.18), 0 2px 6px rgba(11, 79, 122, 0.06);
  --shadow-lg: 0 30px 60px -20px rgba(11, 79, 122, 0.25), 0 8px 16px rgba(11, 79, 122, 0.08);

  --font-display: 'Montserrat', ui-sans-serif, system-ui, sans-serif;
  --font-body: 'Inter', 'Montserrat', ui-sans-serif, system-ui, sans-serif;

  --density: 1;
  --radius-mult: 1;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink-800);
  font-family: var(--font-body);
  font-feature-settings: 'ss01', 'cv11';
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }

/* Typography */
.display {
  font-family: var(--font-display);
  font-weight: 800;
  letter-spacing: -0.025em;
  line-height: 1.02;
  color: var(--ink-900);
  text-wrap: balance;
}
.eyebrow {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--brand-deep);
}
.lead {
  font-size: 18px;
  line-height: 1.55;
  color: var(--ink-600);
  text-wrap: pretty;
  max-width: 60ch;
}

/* Layout */
.container {
  width: 100%;
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 28px;
}
section { padding: calc(96px * var(--density)) 0; position: relative; }
section.compact { padding: calc(64px * var(--density)) 0; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 22px;
  border-radius: calc(var(--radius-pill) * var(--radius-mult));
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14.5px;
  letter-spacing: 0.01em;
  transition: transform .15s ease, box-shadow .2s ease, background .2s ease, color .2s ease, border-color .2s ease;
  white-space: nowrap;
  line-height: 1;
}
.btn:active { transform: translateY(1px); }
.btn-primary {
  background: var(--brand-deep);
  color: white;
  box-shadow: 0 8px 18px -8px rgba(17, 114, 171, 0.55);
}
.btn-primary:hover { background: var(--brand-deep-ink); box-shadow: 0 12px 24px -8px rgba(17, 114, 171, 0.6); }
.btn-teal { background: var(--brand-teal); color: white; box-shadow: 0 8px 18px -8px rgba(79, 190, 206, 0.55); }
.btn-teal:hover { background: var(--brand-teal-ink); color: white; }
.btn-ghost {
  color: var(--ink-800);
  background: transparent;
  border: 1.5px solid var(--ink-200);
}
.btn-ghost:hover { border-color: var(--brand-deep); color: var(--brand-deep); background: var(--brand-deep-soft); }
.btn-white { background: white; color: var(--brand-deep); }
.btn-white:hover { background: var(--brand-deep-soft); }

/* Cards */
.card {
  background: white;
  border: 1px solid var(--ink-100);
  border-radius: calc(var(--radius) * var(--radius-mult));
  transition: transform .25s ease, box-shadow .25s ease, border-color .2s ease;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--ink-200); }

/* Pill */
.pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: var(--radius-pill);
  background: var(--brand-teal-soft); color: var(--brand-teal-ink);
  font-size: 13px; font-weight: 600;
  font-family: var(--font-display);
}
.pill.ink { background: var(--ink-100); color: var(--ink-700); }
.pill.deep { background: var(--brand-deep-soft); color: var(--brand-deep); }

/* Divider dot */
.dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; opacity: 0.35; display: inline-block; }

/* Subtle grid pattern */
.grid-bg {
  background-image:
    radial-gradient(circle at 1px 1px, rgba(17,114,171,0.12) 1px, transparent 0);
  background-size: 24px 24px;
}

/* Focus */
:focus-visible {
  outline: 2.5px solid var(--brand-teal);
  outline-offset: 2px;
  border-radius: 6px;
}

/* Utilities */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

/* Animations */
@keyframes floatPulse {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes shine {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: none; }
}
.fade-in { animation: fadeUp .6s ease both; }

/* ============== RESPONSIVE ============== */

/* Tablet */
@media (max-width: 1024px) {
  section { padding: calc(80px * var(--density)) 0; }
  .container { padding: 0 24px; max-width: 100%; }
  .lead { font-size: 17px; }
}

/* Mobile landscape / small tablet */
@media (max-width: 768px) {
  section { padding: calc(56px * var(--density)) 0; }
  .container { padding: 0 18px; }
  .lead { font-size: 16px; }
  .btn { padding: 13px 18px; font-size: 14px; }
  .eyebrow { font-size: 11px; }
}

/* Mobile */
@media (max-width: 520px) {
  section { padding: calc(48px * var(--density)) 0; }
  .container { padding: 0 16px; }
  .btn { padding: 12px 16px; font-size: 13.5px; width: auto; }
  .card:hover { transform: none; }
}

/* Tap targets: ensure min 44px on touch */
@media (hover: none) {
  button, a.btn, [role="button"] { min-height: 44px; }
}

/* Tables/overflow: prevent horizontal scroll */
html, body { overflow-x: hidden; max-width: 100vw; }

/* Images fluid */
img, svg, iframe { max-width: 100%; height: auto; }

</style>

    const dur = 1800;
    const tick = (t) => {
      if (!start) start = t;
      const p = Math.min(1, (t - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setCounts({
        patients: Math.round(targets.patients * eased),
        specialties: Math.round(targets.specialties * eased),
        years: Math.round(targets.years * eased),
      });
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "brandDeep": "#1172AB",
  "brandTeal": "#4FBECE",
  "density": 1,
  "radius": 1,
  "font": "Montserrat"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);
  const [booking, setBooking] = React.useState({ open: false, spec: '' });

  // Edit mode protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Apply tweaks to root
  React.useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--brand-deep', tweaks.brandDeep);
    root.style.setProperty('--brand-teal', tweaks.brandTeal);
    root.style.setProperty('--density', tweaks.density);
    root.style.setProperty('--radius-mult', tweaks.radius);
    root.style.setProperty('--font-display', `'${tweaks.font}', system-ui, sans-serif`);
    // Persist
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweaks }, '*');
  }, [tweaks]);

  const openBook = (spec = '') => setBooking({ open: true, spec });

  return (
    <>
      <Nav onBookClick={() => openBook()} />
      <main>
        <Hero onBookClick={() => openBook()} onPickSpecialty={(s) => openBook(s)} />
        <Specialties onBookSpecialty={(s) => openBook(s)} />
        <WhyUs />
        <Team />
        <Testimonials />
        <Blog />
        <FAQ />
        <Location />
        <CTABand onBookClick={() => openBook()} />
      </main>
      <Footer />
      <WhatsAppFloat />
      <BookingModal open={booking.open} onClose={() => setBooking({ open: false, spec: '' })} initialSpecialty={booking.spec} />
      <TweaksPanel editMode={editMode} tweaks={tweaks} setTweaks={setTweaks} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
