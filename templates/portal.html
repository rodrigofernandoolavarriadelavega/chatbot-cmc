<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#0F3F68">
<title>Portal del Paciente · Centro Médico Carampangue</title>
<link rel="icon" type="image/png" href="https://centromedicocarampangue.cl/wp-content/uploads/2025/08/cropped-logo-carampangue.png">
<link rel="shortcut icon" type="image/png" href="https://centromedicocarampangue.cl/wp-content/uploads/2025/08/cropped-logo-carampangue.png">
<link rel="apple-touch-icon" href="https://centromedicocarampangue.cl/wp-content/uploads/2025/08/cropped-logo-carampangue.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
html{color-scheme:light only}
:root{
  /* Paleta CMC (Manual de Marca) */
  --cmc-aqua:#4FBECE; --cmc-aqua-soft:#e5f5f8; --cmc-aqua-dark:#3ba9ba;
  --cmc-blue:#1172AB; --cmc-blue-soft:#e3eff7;
  --cmc-navy:#0F3F68; --cmc-navy-soft:#d7e0ea;
  /* UI */
  --bg:#f3f6f9; --panel:#ffffff; --panel-2:#f7fafc;
  --border:#e3ebf1; --border-soft:#eef3f7;
  --text:#0F3F68; --text-mute:#546776; --text-dim:#8696a0;
  --green:#25d366; --green-dark:#128c7e;
  --red:#e53935; --red-soft:#ffebee;
  --amber:#b58105; --amber-soft:#fff4d6;
  /* Sombras tintadas en navy */
  --shadow-xs:0 1px 2px rgba(15,63,104,.04);
  --shadow-sm:0 1px 2px rgba(15,63,104,.05), 0 1px 3px rgba(15,63,104,.04);
  --shadow-md:0 2px 6px rgba(15,63,104,.05), 0 6px 18px rgba(15,63,104,.06);
  --shadow-lg:0 4px 12px rgba(15,63,104,.06), 0 16px 36px rgba(15,63,104,.10);
  --ring:0 0 0 3px rgba(79,190,206,.22);
  --radius:14px; --radius-sm:10px; --radius-lg:18px;
  --ease:cubic-bezier(.4,0,.2,1);
  --font:"Montserrat",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg); color:var(--text); font-family:var(--font);
  font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  min-height:100vh; min-height:100dvh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;transition:all .18s var(--ease)}
button:active{transform:scale(.97)}
input{font-family:inherit;color:inherit}
::selection{background:rgba(79,190,206,.32); color:var(--cmc-navy)}

/* ═══════ Screens ═══════ */
.screen{display:none}
.screen.active{display:flex}

/* ═══════ Loading ═══════ */
.loading-screen{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; min-height:100dvh; gap:14px;
}
.spinner{
  width:34px; height:34px; border:3px solid var(--border);
  border-top-color:var(--cmc-blue); border-radius:50%;
  animation:spin .7s linear infinite;
}
.spinner.sm{width:18px;height:18px;border-width:2.5px;border-color:rgba(255,255,255,.35);border-top-color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen p{font-size:13px;color:var(--text-dim);font-weight:500}

/* ═══════════════════════════════════════════
   LOGIN
   ═══════════════════════════════════════════ */
#login-screen{
  flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; min-height:100dvh; padding:24px 20px;
  background:
    radial-gradient(1200px 600px at 50% -100px, rgba(79,190,206,.18), transparent 60%),
    radial-gradient(900px 500px at 50% 110%, rgba(17,114,171,.10), transparent 60%),
    var(--bg);
}
.login-card{
  background:var(--panel); border-radius:20px; box-shadow:var(--shadow-lg);
  padding:36px 28px 28px; width:100%; max-width:400px;
  border:1px solid var(--border-soft);
}
.login-brand{display:flex; flex-direction:column; align-items:center; margin-bottom:26px}
.login-brand .logo{
  width:64px; height:64px; border-radius:16px; padding:6px;
  background:linear-gradient(180deg,#fff,#f7fbfd);
  border:1px solid var(--border); box-shadow:var(--shadow-sm);
  display:flex; align-items:center; justify-content:center;
}
.login-brand .logo img{width:100%;height:100%;object-fit:contain}
.login-brand h1{
  font-size:18px; font-weight:800; color:var(--cmc-navy);
  margin-top:14px; letter-spacing:-.2px;
}
.login-brand .tag{
  font-size:10px; color:var(--cmc-aqua); font-weight:700;
  letter-spacing:2px; text-transform:uppercase; margin-top:4px;
}

.form-group{margin-bottom:14px}
.form-group label{
  display:block; font-size:11px; font-weight:700; letter-spacing:.8px;
  color:var(--text-mute); margin-bottom:7px; text-transform:uppercase;
}
.form-group input{
  width:100%; padding:13px 15px; border:1.5px solid var(--border);
  border-radius:12px; font-size:16px; color:var(--text); background:var(--panel-2);
  transition:border-color .18s, box-shadow .18s, background-color .18s;
  font-weight:500; letter-spacing:.3px;
}
.form-group input::placeholder{color:var(--text-dim);font-weight:400}
.form-group input:hover{border-color:var(--cmc-aqua-dark);background:#fff}
.form-group input:focus{
  outline:none; border-color:var(--cmc-aqua); background:#fff; box-shadow:var(--ring);
}

.btn{
  width:100%; padding:14px; border-radius:12px;
  font-size:14px; font-weight:700; letter-spacing:.4px;
  display:flex; align-items:center; justify-content:center; gap:10px;
  transition:background-color .18s, box-shadow .18s, transform .12s;
}
.btn-primary{
  background:linear-gradient(135deg, var(--cmc-blue), var(--cmc-navy));
  color:#fff; box-shadow:0 4px 12px rgba(17,114,171,.28);
}
.btn-primary:hover{box-shadow:0 6px 18px rgba(17,114,171,.36)}
.btn-primary:disabled{opacity:.55; cursor:not-allowed; box-shadow:none}

.message{
  margin-top:12px; padding:11px 14px; border-radius:10px;
  font-size:12.5px; font-weight:600; text-align:center; display:none;
}
.message.error{background:var(--red-soft); color:var(--red)}
.message.info{background:var(--cmc-aqua-soft); color:var(--cmc-blue)}
.message.show{display:block}

/* OTP */
.otp-section{display:none}
.otp-section.show{display:block}
.otp-header{
  font-size:12.5px; color:var(--text-mute); text-align:center;
  margin:6px 0 16px; line-height:1.5;
}
.otp-header strong{color:var(--cmc-navy); font-weight:700}
.otp-boxes{display:flex; gap:8px; justify-content:center; margin-bottom:18px}
.otp-boxes input{
  width:46px; height:54px; text-align:center;
  font-size:22px; font-weight:700; color:var(--cmc-navy);
  border:1.5px solid var(--border); border-radius:12px;
  background:var(--panel-2); transition:all .18s var(--ease);
}
.otp-boxes input:focus{
  outline:none; border-color:var(--cmc-aqua); background:#fff; box-shadow:var(--ring);
  transform:translateY(-1px);
}
.otp-boxes input:not(:placeholder-shown){background:#fff; border-color:var(--cmc-aqua-dark)}
.resend-link{
  display:block; text-align:center; margin-top:14px; padding:8px;
  font-size:12px; color:var(--cmc-blue); font-weight:600; cursor:pointer;
  border-radius:8px; transition:background-color .15s;
}
.resend-link:hover{background:var(--cmc-aqua-soft)}

/* ═══════════════════════════════════════════
   DASHBOARD
   ═══════════════════════════════════════════ */
#dashboard-screen{flex-direction:column; min-height:100vh; min-height:100dvh}

.topbar{
  height:56px; padding-top:env(safe-area-inset-top);
  background:rgba(255,255,255,.92); backdrop-filter:saturate(160%) blur(10px);
  -webkit-backdrop-filter:saturate(160%) blur(10px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding-left:18px; padding-right:14px;
  gap:10px; box-shadow:var(--shadow-xs);
  position:sticky; top:0; z-index:5;
}
.topbar::after{
  content:""; position:absolute; left:0; right:0; bottom:-1px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(79,190,206,.35), rgba(17,114,171,.25), transparent);
  pointer-events:none;
}
.brand{display:flex; align-items:center; gap:11px; height:100%; color:var(--text); padding-right:14px; position:relative}
.brand::after{
  content:""; position:absolute; right:0; top:50%; transform:translateY(-50%);
  width:1px; height:28px; background:var(--border);
}
.brand-logo{
  width:40px; height:40px; border-radius:12px; flex:0 0 40px;
  background:linear-gradient(180deg,#fff,#f7fbfd);
  border:1px solid var(--border);
  box-shadow:var(--shadow-xs), inset 0 1px 0 rgba(255,255,255,.6);
  display:flex; align-items:center; justify-content:center; padding:3px;
}
.brand-logo img{width:100%;height:100%;object-fit:contain;display:block}
.brand-text{display:flex; flex-direction:column; line-height:1.15; gap:2px}
.brand-text .top{
  font-size:9px; color:var(--cmc-aqua); letter-spacing:2.4px;
  text-transform:uppercase; font-weight:700;
}
.brand-text .bot{
  font-size:14px; font-weight:800; color:var(--cmc-navy); letter-spacing:1.1px;
  text-transform:uppercase;
}
.topbar .spacer{flex:1}
.btn-logout{
  padding:7px 12px; background:transparent; border:1px solid transparent;
  border-radius:8px; font-size:12px; color:var(--text-mute);
  display:inline-flex; align-items:center; gap:6px; font-weight:600; line-height:1;
}
.btn-logout:hover{background:var(--panel-2); color:var(--cmc-navy); border-color:var(--border-soft)}

.page-head{padding:18px 20px 10px; display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap}
.page-head .greeting{font-size:20px; font-weight:800; color:var(--cmc-navy); letter-spacing:-.3px; line-height:1.2}
.page-head .meta{font-size:11.5px; color:var(--text-mute); margin-top:3px; font-weight:500; letter-spacing:.2px}

.content{
  flex:1; width:100%;
  padding:8px 20px calc(96px + env(safe-area-inset-bottom));
  display:grid; grid-template-columns: minmax(0, 580px) minmax(360px, 1fr);
  gap:22px; align-items:start;
}
@media (max-width:960px){
  .content{grid-template-columns: minmax(0, 1fr); gap:14px}
}

/* Consejos de vida sana */
.tips-grid{display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:10px}
@media (max-width:520px){ .tips-grid{grid-template-columns:1fr} }
.tip{
  background:linear-gradient(180deg, #fff, var(--panel-2));
  border:1px solid var(--border-soft); border-radius:var(--radius);
  padding:12px 14px; position:relative; overflow:hidden;
  transition:transform .18s var(--ease), box-shadow .18s var(--ease);
}
.tip:hover{transform:translateY(-1px); box-shadow:var(--shadow-sm)}
.tip .tip-head{display:flex; align-items:center; gap:9px; margin-bottom:5px}
.tip .tip-icon{
  width:30px; height:30px; border-radius:9px; flex:0 0 30px;
  display:flex; align-items:center; justify-content:center;
  background:var(--cmc-aqua-soft); color:var(--cmc-blue);
}
.tip .tip-icon svg{width:16px; height:16px}
.tip.green .tip-icon{background:#dcf8c6; color:var(--green-dark)}
.tip.amber .tip-icon{background:var(--amber-soft); color:#8b6508}
.tip.navy .tip-icon{background:var(--cmc-navy-soft); color:var(--cmc-navy)}
.tip .tip-title{font-size:12.5px; font-weight:700; color:var(--cmc-navy); letter-spacing:-.1px; line-height:1.2}
.tip .tip-desc{font-size:11.5px; color:var(--text-mute); line-height:1.45; margin-top:4px}
.tip .tip-tag{
  display:inline-block; font-size:9px; font-weight:800; letter-spacing:1.2px;
  text-transform:uppercase; color:var(--cmc-aqua-dark); margin-bottom:2px;
}

/* Contenedor principal que agrupa secciones en un surface horizontal */
.surface{
  background:var(--panel); border:1px solid var(--border-soft);
  border-radius:var(--radius-lg); box-shadow:var(--shadow-sm);
  padding:18px 20px; display:flex; flex-direction:column; gap:22px;
}
.surface .section{margin-bottom:0}
.surface .section + .section{
  padding-top:20px; border-top:1px dashed var(--border);
}

/* Aside: promos / cross-selling */
.aside{
  display:flex; flex-direction:column; gap:14px;
  position:sticky; top:72px;
  max-height:calc(100vh - 88px);
  overflow-y:auto; overflow-x:hidden;
  padding:2px 8px 8px 2px;
  scroll-behavior:smooth;
}
.aside > *{flex-shrink:0}
.aside::-webkit-scrollbar{width:6px}
.aside::-webkit-scrollbar-thumb{background:rgba(15,63,104,.15); border-radius:10px}
.aside:hover::-webkit-scrollbar-thumb{background:rgba(15,63,104,.3)}
.aside-fade{display:none}
@media (max-width:960px){
  .aside{position:static; max-height:none; overflow:visible; padding:0}
}
.aside-title{
  font-size:12px; font-weight:800; color:var(--cmc-navy);
  letter-spacing:.6px; text-transform:uppercase; padding:0 4px 2px;
  display:flex; align-items:center; gap:8px;
}
.aside-title::before{
  content:""; width:8px; height:8px; border-radius:50%;
  background:var(--cmc-aqua); box-shadow:0 0 0 4px rgba(79,190,206,.2);
}
.promo{
  background:var(--panel); border-radius:var(--radius);
  border:1px solid var(--border-soft); box-shadow:var(--shadow-xs);
  padding:14px 15px; position:relative; overflow:hidden;
  transition:transform .2s var(--ease), box-shadow .2s var(--ease);
}
.promo:hover{transform:translateY(-1px); box-shadow:var(--shadow-md)}
.promo::before{
  content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:linear-gradient(180deg, var(--cmc-aqua), var(--cmc-blue));
}
.promo .head{display:flex; align-items:center; gap:10px; margin-bottom:6px}
.promo .icon{
  width:34px; height:34px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  background:var(--cmc-aqua-soft); color:var(--cmc-blue); flex:0 0 34px;
}
.promo .icon svg{width:17px;height:17px}
.promo .label{
  font-size:9px; letter-spacing:1.5px; text-transform:uppercase;
  font-weight:800; color:var(--cmc-aqua-dark); margin-bottom:2px;
}
.promo .title{font-size:13.5px; font-weight:700; color:var(--cmc-navy); letter-spacing:-.1px; line-height:1.25}
.promo .desc{font-size:12px; color:var(--text-mute); margin-top:6px; line-height:1.45}
.promo .cta{
  display:inline-flex; align-items:center; gap:5px; margin-top:10px;
  font-size:11.5px; font-weight:700; color:var(--cmc-blue); letter-spacing:.2px;
  padding:6px 0; cursor:pointer;
}
.promo .cta:hover{color:var(--cmc-navy)}
.promo .cta svg{width:12px; height:12px; transition:transform .2s}
.promo .cta:hover svg{transform:translateX(2px)}
.promo.accent{
  background:linear-gradient(135deg, var(--cmc-aqua-soft), #fff);
  border-color:rgba(79,190,206,.35);
}
.promo.accent::before{background:var(--cmc-aqua)}
.promo .price{
  display:inline-block; font-size:11px; font-weight:800;
  color:var(--cmc-blue); background:var(--cmc-aqua-soft);
  padding:3px 9px; border-radius:12px; margin-top:8px; letter-spacing:.3px;
}

/* Secciones */
.section{margin-bottom:24px; animation:fadeInUp .35s var(--ease) both}
.section:nth-child(2){animation-delay:.05s}
.section:nth-child(3){animation-delay:.1s}
.section:nth-child(4){animation-delay:.15s}
@keyframes fadeInUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.section-head{
  display:flex; align-items:center; gap:10px; padding:0 4px;
  margin-bottom:12px;
}
.section-head .dot{
  width:8px; height:8px; border-radius:50%;
  background:var(--cmc-aqua); box-shadow:0 0 0 4px rgba(79,190,206,.2);
}
.section-head h2{
  font-size:13px; font-weight:800; color:var(--cmc-navy);
  letter-spacing:.5px; text-transform:uppercase; flex:1;
}
.section-head .count{
  font-size:11px; font-weight:700; color:var(--cmc-blue);
  background:var(--cmc-aqua-soft); padding:3px 10px; border-radius:20px;
  letter-spacing:.2px;
}

/* ═══ CARD: próxima cita (hero style) ═══ */
.appt-card{
  background:var(--panel); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-md); margin-bottom:10px;
  overflow:hidden; position:relative; border:1px solid var(--border-soft);
  transition:transform .2s var(--ease), box-shadow .2s var(--ease);
}
.appt-card:hover{transform:translateY(-1px); box-shadow:var(--shadow-lg)}

.appt-card .body{
  display:grid; grid-template-columns:78px 1fr; gap:14px;
  padding:16px 18px 16px 16px; align-items:center;
}

/* Tira de fecha estilo agenda */
.date-chip{
  background:linear-gradient(160deg, var(--cmc-aqua-soft), var(--cmc-blue-soft));
  border-radius:14px; padding:10px 6px 12px;
  text-align:center; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
  position:relative; overflow:hidden;
  border:1px solid rgba(79,190,206,.25);
}
.date-chip::before{
  content:""; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--cmc-aqua), var(--cmc-blue));
}
.date-chip .dow{
  font-size:10px; font-weight:800; letter-spacing:1.2px;
  color:var(--cmc-blue); text-transform:uppercase;
}
.date-chip .day{
  font-size:28px; font-weight:800; color:var(--cmc-navy);
  line-height:1; font-feature-settings:"tnum"; letter-spacing:-1px;
}
.date-chip .month{
  font-size:9.5px; font-weight:700; letter-spacing:1.5px;
  color:var(--text-mute); text-transform:uppercase; margin-top:1px;
}

.appt-info{min-width:0; display:flex; flex-direction:column; gap:4px}
.appt-specialty{
  font-size:11px; font-weight:700; letter-spacing:.4px;
  text-transform:uppercase; color:var(--cmc-blue);
  display:inline-flex; align-items:center; gap:5px;
}
.appt-time{
  font-size:20px; font-weight:800; color:var(--cmc-navy);
  line-height:1.1; font-feature-settings:"tnum";
  display:flex; align-items:baseline; gap:6px;
}
.appt-time .hrs{font-size:11px; font-weight:600; color:var(--text-dim); letter-spacing:.5px}
.appt-prof{
  font-size:13px; color:var(--text-mute); font-weight:500;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.appt-when{
  display:inline-flex; align-items:center; gap:5px;
  font-size:10.5px; font-weight:700; letter-spacing:.3px;
  padding:3px 9px; border-radius:20px; margin-top:2px;
  width:fit-content; text-transform:uppercase;
}
.appt-when.today{background:var(--green); color:#fff; box-shadow:0 2px 6px rgba(37,211,102,.3)}
.appt-when.tomorrow{background:#fff3cd; color:#8b6508}
.appt-when.soon{background:var(--cmc-aqua-soft); color:var(--cmc-blue)}
.appt-when.later{background:var(--panel-2); color:var(--text-mute)}

/* ═══ CARD: historial (compacto) ═══ */
.history-card{
  background:var(--panel); border-radius:var(--radius); padding:12px 14px;
  box-shadow:var(--shadow-xs); margin-bottom:8px;
  border:1px solid var(--border-soft);
  display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center;
  transition:background-color .15s;
}
.history-card:hover{background:var(--panel-2)}
.history-info{min-width:0; display:flex; flex-direction:column; gap:2px}
.history-date{
  font-size:12.5px; font-weight:700; color:var(--cmc-navy);
  letter-spacing:.2px;
}
.history-prof{
  font-size:12px; color:var(--text-mute); font-weight:500;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.history-right{display:flex; flex-direction:column; align-items:flex-end; gap:3px}
.history-time{
  font-size:13px; font-weight:700; color:var(--cmc-blue);
  font-feature-settings:"tnum";
}
.history-spec{
  font-size:9.5px; font-weight:700; letter-spacing:.6px;
  text-transform:uppercase; color:var(--text-dim);
  padding:2px 7px; border-radius:12px; background:var(--panel-2);
}

.historial-toggle{
  background:none; color:var(--cmc-blue); padding:10px 4px;
  font-size:12px; font-weight:700; letter-spacing:.3px;
  display:flex; align-items:center; gap:4px;
  margin-top:4px;
}
.historial-toggle:hover{color:var(--cmc-navy)}
.historial-rest{display:none}
.historial-rest.open{display:block; animation:fadeInUp .25s var(--ease)}

/* ═══ Diagnósticos ═══ */
.dx-list{display:flex; flex-wrap:wrap; gap:7px}
.dx-chip{
  display:inline-flex; align-items:center; gap:6px;

let currentRut = '';
let patientData = null;

const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const DIAS = ['dom','lun','mar','mié','jue','vie','sáb'];

// ══ Init ══
(async function init() {
  try {
    const r = await fetch('/portal/api/datos', { credentials: 'same-origin' });
    if (r.ok) {
      patientData = await r.json();
      showDashboard();
    } else {
      showLogin();
    }
  } catch { showLogin(); }
})();

function showLogin() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('dashboard-screen').classList.remove('active');
  document.getElementById('rut-input').focus();
}
function showDashboard() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('dashboard-screen').classList.add('active');
  renderDashboard();
}

// ══ RUT formatter ══
document.getElementById('rut-input').addEventListener('input', function(e) {
  let v = e.target.value.replace(/[^0-9kK]/g, '').toUpperCase();
  if (v.length > 9) v = v.slice(0, 9);
  if (v.length > 1) {
    const dv = v.slice(-1);
    const body = v.slice(0, -1);
    let formatted = '';
    const reversed = body.split('').reverse();
    for (let i = 0; i < reversed.length; i++) {
      if (i > 0 && i % 3 === 0) formatted = '.' + formatted;
      formatted = reversed[i] + formatted;
    }
    e.target.value = formatted + '-' + dv;
  }
});
document.getElementById('rut-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') requestCode();
});

// ══ OTP ══
const otpInputs = document.querySelectorAll('#otp-boxes input');
otpInputs.forEach((inp, i) => {
  inp.addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '');
    if (this.value && i < 5) otpInputs[i + 1].focus();
    if (i === 5 && this.value) {
      const code = Array.from(otpInputs).map(x => x.value).join('');
      if (code.length === 6) verifyCode();
    }
  });
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !this.value && i > 0) otpInputs[i - 1].focus();
  });
  inp.addEventListener('paste', function(e) {
    e.preventDefault();
    const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
    for (let j = 0; j < 6 && j < paste.length; j++) otpInputs[j].value = paste[j];
    if (paste.length >= 6) verifyCode();
    else if (paste.length > 0) otpInputs[Math.min(paste.length, 5)].focus();
  });
});

// ══ API ══
async function requestCode() {
  const rut = document.getElementById('rut-input').value.trim();
  if (!rut || rut.length < 9) { showError('Ingresa un RUT válido'); return; }
  currentRut = rut;
  const btn = document.getElementById('btn-send-code');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner sm"></span>';
  hideMessages();

  try {
    const r = await fetch('/portal/api/request-code', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rut }),
    });
    const data = await r.json();
    if (!r.ok) {
      showError(data.detail || 'Error enviando código');

      return;
    }
    document.getElementById('step-rut').style.display = 'none';
    document.getElementById('otp-section').classList.add('show');
    if (data.rut_masked) document.getElementById('otp-target').textContent = 'WhatsApp (' + data.rut_masked + ')';
    showInfo('Código enviado a tu WhatsApp');
    otpInputs.forEach(x => x.value = '');
    otpInputs[0].focus();
  } catch { showError('Error de conexión'); }
  btn.disabled = false;
}

async function verifyCode() {
  const code = Array.from(otpInputs).map(x => x.value).join('');
  if (code.length !== 6) { showError('Ingresa los 6 dígitos'); return; }
  const btn = document.getElementById('btn-verify');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner sm"></span>';
  hideMessages();

  try {
    const r = await fetch('/portal/api/verify-code', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rut: currentRut, code }),
      credentials: 'same-origin',
    });
    const data = await r.json();
    if (!r.ok) {
      showError(data.detail || 'Código incorrecto');
      btn.disabled = false; btn.textContent = 'Verificar';
      otpInputs.forEach(x => x.value = ''); otpInputs[0].focus();
      return;
    }
    const r2 = await fetch('/portal/api/datos', { credentials: 'same-origin' });
    if (r2.ok) { patientData = await r2.json(); showDashboard(); }
    else showError('Error cargando datos');
  } catch { showError('Error de conexión'); }
  btn.disabled = false; btn.textContent = 'Verificar';
}

async function doLogout() {
  await fetch('/portal/api/logout', { method: 'POST', credentials: 'same-origin' });
  patientData = null;
  document.getElementById('step-rut').style.display = 'block';
  document.getElementById('otp-section').classList.remove('show');
  document.getElementById('rut-input').value = '';
  hideMessages();
  showLogin();
}

function agendar() {
  if (patientData && patientData.whatsapp_url) window.open(patientData.whatsapp_url, '_blank');
}

// ══ Date helpers ══
function parseCitaDate(fechaStr) {
  // Recibe "YYYY-MM-DD"
  if (!fechaStr) return null;
  const [y, m, d] = fechaStr.split('-').map(n => parseInt(n, 10));
  return new Date(y, m - 1, d);
}
function daysUntil(fechaStr) {
  const target = parseCitaDate(fechaStr);
  if (!target) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}
function whenBadge(fechaStr) {
  const d = daysUntil(fechaStr);
  if (d === null) return null;
  if (d === 0) return { cls:'today', label:'Hoy' };
  if (d === 1) return { cls:'tomorrow', label:'Mañana' };
  if (d > 1 && d <= 7) return { cls:'soon', label:`En ${d} días` };
  if (d > 7) return { cls:'later', label:`En ${d} días` };
  return null;
}
function dateChip(fechaStr) {
  const d = parseCitaDate(fechaStr);
  if (!d) return { dow:'—', day:'—', month:'—' };
  return {
    dow: DIAS[d.getDay()],
    day: d.getDate(),
    month: MESES[d.getMonth()],
  };
}
function fmtHistoryDate(fechaStr) {
  const d = parseCitaDate(fechaStr);
  if (!d) return fechaStr;
  return `${DIAS[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]} ${d.getFullYear()}`;
}

function pickTips(d){
  const dx = [...(d.diagnosticos || [])].map(x => x.toLowerCase()).join(' | ');
  const historyEsp = (d.historial || []).map(c => (c.especialidad || '').toLowerCase()).join(' | ');
  const hasDx = kw => dx.includes(kw);
  const priority = [];
  // Condicionales por dx
  if (hasDx('hta') || hasDx('hiperten') || hasDx('presi')) { priority.push('sal','presion_medir','caminar'); }
  if (hasDx('dm2') || hasDx('diab')) { priority.push('azucar','glicemia','hidratos','pies','caminar'); }
  if (hasDx('asma') || hasDx('epoc')) { priority.push('inhalador','respiracion','tabaco'); }
  if (hasDx('obes') || hasDx('sobrep')) { priority.push('azucar','caminar','frutas'); }
  if (hasDx('colest') || hasDx('dislip')) { priority.push('legumbres','caminar','sal'); }
  if (hasDx('ansie') || hasDx('depre')) { priority.push('mental','sueno','caminar'); }
  // Complementos generales por historial
  if (historyEsp.includes('traumat') || historyEsp.includes('kinesio')) priority.push('elongar','fuerza');
  if (historyEsp.includes('psico')) priority.push('mental','sueno');
  // Base: sano general
  const baseline = ['caminar','frutas','agua','sueno','fuerza','mental','sol','alcohol','tabaco','legumbres','elongar','respiracion'];
  const seen = new Set();
  const result = [];
  for (const k of [...priority, ...baseline]) {
    if (TIPS_CATALOG[k] && !seen.has(k)) { seen.add(k); result.push(k); }
    if (result.length >= 6) break;
  }
  return result;
}

// Qué promos sobran cuando el paciente ya tiene esa especialidad agendada o la tuvo recientemente
const PROMO_SPECIALTY_MAP = {
  chequeo: ['medicina general','medicina familiar'],
  kine:    ['kinesiología','kinesiologia'],
  cardio:  ['cardiología','cardiologia'],
  nutri:   ['nutrición','nutricion'],
  psico:   ['psicología','psicologia','psicología adulto','psicología infantil'],
  odonto:  ['odontología general','odontologia'],
  ortodoncia: ['ortodoncia'],
  endo:    ['endodoncia'],
  matrona: ['matrona','ginecología','ginecologia'],
  orl_fono:['otorrinolaringología','otorrinolaringologia','fonoaudiología','fonoaudiologia'],
  eco:     ['ecografía','ecografia'],
  estetica:['estética facial','estetica facial'],
  podologia:['podología','podologia'],
  masoterapia:['masoterapia'],
  gastro:  ['gastroenterología','gastroenterologia'],
};

function pickPromos(d){
  const dx = [...(d.diagnosticos || [])].map(x => x.toLowerCase()).join(' | ');
  const historyEsp = (d.historial || []).map(c => (c.especialidad || '').toLowerCase());
  const futureEsp  = (d.citas_futuras || []).map(c => (c.especialidad || '').toLowerCase());
  const covered = new Set([...historyEsp, ...futureEsp]);
  const hasDx = kw => dx.includes(kw);
  const hasSpec = kw => [...covered].some(s => s.includes(kw));
  const coveredByPromo = key => {
    const specs = PROMO_SPECIALTY_MAP[key] || [];
    return specs.some(s => [...covered].some(c => c.includes(s)));
  };

  const scored = [];
  const push = (key, score) => scored.push({ key, score });

  // === Contexto demográfico ===
  const hasProx = futureEsp.length > 0;

  // === Recomendaciones clínicas ===
  // HTA: cardio + nutri + podología (si además DM2)
  if (hasDx('hta') || hasDx('hiperten') || hasDx('presi')) {
    push('cardio', 100); push('nutri', 90);
  }
  // DM2: nutri + podología + cardio + ecografía (control renal/hepático)
  if (hasDx('dm2') || hasDx('diab')) {
    push('nutri', 100); push('podologia', 95); push('cardio', 85); push('eco', 70);
  }
  // Asma/EPOC: kine respiratoria (la marcamos como kine genérica)
  if (hasDx('asma') || hasDx('epoc')) { push('kine', 80); }
  // Traumatología histórica → kine + masoterapia
  if (hasSpec('traumat') && !coveredByPromo('kine')) { push('kine', 90); push('masoterapia', 60); }
  // Ortodoncia en curso → control y estética dental
  if (hasSpec('ortodon')) { push('ortodoncia', 70); push('odonto', 55); }
  // Odontología histórica → endo + estética dental
  if (hasSpec('odontolog') && !hasSpec('ortodon')) { push('endo', 55); push('odonto', 50); }
  // ORL ↔ Fono cross-sell
  if (hasSpec('otorri') || hasSpec('fonoaud')) { push('orl_fono', 70); }
  // Ginecología sin matrona → matrona
  if (hasSpec('ginecol') && !coveredByPromo('matrona')) push('matrona', 65);
  // Kine en curso → masoterapia complementaria
  if (hasSpec('kinesio')) push('masoterapia', 55);

  // === Complementos inteligentes a la cita próxima ===
  // Si tiene consulta MG próxima, no redundar: sugerir nutri/psico/eco que suelen salir derivadas
  if (hasSpec('medicina general') || hasSpec('medicina familiar')) {
    push('nutri', 60); push('psico', 55); push('eco', 50); push('cardio', 45);
  }
  // Si tiene gine → matrona/eco; si tiene matrona → gine
  if (hasSpec('ginecol')) push('eco', 50);

  // === Si paciente sin próxima y sin historial relevante → chequeo preventivo ===
  if (!hasProx && historyEsp.length === 0) push('chequeo', 75);

  // === Fallback genérico (baja prioridad) ===
  const fallback = ['psico','nutri','odonto','kine','estetica','eco','matrona','gastro','podologia','masoterapia','orl_fono','cardio','ortodoncia','endo','chequeo'];
  fallback.forEach((k, i) => push(k, 10 - i * 0.1));

  // Deduplicar, descartar los ya cubiertos por agenda/historial, y ordenar por score
  const best = new Map();
  for (const { key, score } of scored) {
    if (!PROMO_CATALOG[key]) continue;
    if (coveredByPromo(key)) continue;
    if (!best.has(key) || best.get(key) < score) best.set(key, score);
  }
  const sorted = [...best.entries()].sort((a, b) => b[1] - a[1]).map(([k]) => k);

  // Garantizar 10 items — si filtramos demasiado, rellenar ignorando "covered"
  if (sorted.length < 10) {
    for (const k of fallback) {
      if (!sorted.includes(k)) sorted.push(k);
      if (sorted.length >= 10) break;
    }
  }
  return sorted.slice(0, 10);
}

    const renderHist = (c) => `<div class="history-card">
      <div class="history-info">
        <span class="history-date">${fmtHistoryDate(c.fecha)}</span>
        <span class="history-prof">${c.profesional || 'Profesional'}</span>
      </div>
      <div class="history-right">
        <span class="history-time">${c.hora_inicio}</span>
        ${c.especialidad ? `<span class="history-spec">${c.especialidad}</span>` : ''}
      </div>
    </div>`;
    for (const c of show) main += renderHist(c);
    if (rest.length > 0) {
      main += `<button class="historial-toggle" onclick="toggleHistorial()">
        <span id="hist-toggle-label">Ver ${rest.length} más</span>
        <svg id="hist-toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="historial-rest" id="historial-rest">
        ${rest.map(renderHist).join('')}
      </div>`;
    }
  }
  main += `</div>`;

  // Consejos de vida sana
  const tips = pickTips(d);
  if (tips.length > 0) {
    main += `<div class="section">
      <div class="section-head">
        <span class="dot" style="background:var(--green-dark); box-shadow:0 0 0 4px rgba(18,140,126,.18)"></span>
        <h2>Consejos para ti</h2>
        <span class="count">${tips.length}</span>
      </div>
      <div class="tips-grid">`;
    for (const key of tips) {
      const t = TIPS_CATALOG[key]; if (!t) continue;
      main += `<div class="tip ${t.color || ''}">
        <div class="tip-head">
          <span class="tip-icon">${t.svg}</span>
          <div style="flex:1; min-width:0">
            <div class="tip-tag">${t.cat}</div>
            <div class="tip-title">${t.title}</div>
          </div>
        </div>
        <div class="tip-desc">${t.desc}</div>
      </div>`;
    }
    main += `</div></div>`;
  }

  main += `</main>`;

  // ══ ASIDE (promos) ══
  const picks = pickPromos(d);
  let aside = `<aside class="aside">
    <div class="aside-title">Recomendado para ti</div>`;
  picks.forEach((key, idx) => {
    const p = PROMO_CATALOG[key]; if (!p) return;
    aside += `<div class="promo ${idx === 0 ? 'accent' : ''}" onclick="agendar()">
      <div class="head">
        <span class="icon">${p.iconSvg}</span>
        <div style="flex:1; min-width:0">
          <div class="label">${p.label}</div>
          <div class="title">${p.title}</div>
        </div>
      </div>
      <div class="desc">${p.desc}</div>
      ${p.price ? `<span class="price">${p.price}</span>` : ''}
      <div class="cta">
        Agendar por WhatsApp
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
    </div>`;
  });
  aside += `<div class="aside-fade"></div></aside>`;

  c.innerHTML = main + aside;
}

function toggleHistorial() {
  const list = document.getElementById('historial-rest');
  const label = document.getElementById('hist-toggle-label');
  const icon = document.getElementById('hist-toggle-icon');
  if (list.classList.contains('open')) {
    list.classList.remove('open');
    label.textContent = `Ver ${patientData.historial.length - 3} más`;
    icon.style.transform = 'rotate(0deg)';
  } else {
    list.classList.add('open');
    label.textContent = 'Ver menos';
    icon.style.transform = 'rotate(180deg)';
  }
}

// ══ Messages ══
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('info-msg').classList.remove('show');
}
function showInfo(msg) {
  const el = document.getElementById('info-msg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('error-msg').classList.remove('show');
}
function hideMessages() {
  document.getElementById('error-msg').classList.remove('show');
  document.getElementById('info-msg').classList.remove('show');
}
</script>
</body>
</html>
