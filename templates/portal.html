<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#0F3F68">
<title>Portal del Paciente · Centro Médico Carampangue</title>
<link rel="icon" href="/static/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
html{color-scheme:light only}
:root{
  /* Paleta CMC (Manual de Marca) */
  --cmc-aqua:#4FBECE; --cmc-aqua-soft:#e5f5f8; --cmc-aqua-dark:#3ba9ba;
  --cmc-blue:#1172AB; --cmc-blue-soft:#e3eff7;
  --cmc-navy:#0F3F68; --cmc-navy-soft:#d7e0ea;
  /* UI */
  --bg:#f3f6f9; --panel:#ffffff; --panel-2:#f7fafc;
  --border:#e3ebf1; --border-soft:#eef3f7;
  --text:#0F3F68; --text-mute:#546776; --text-dim:#8696a0;
  --green:#25d366; --green-dark:#128c7e;
  --red:#e53935; --red-soft:#ffebee;
  --amber:#b58105; --amber-soft:#fff4d6;
  /* Sombras tintadas en navy */
  --shadow-xs:0 1px 2px rgba(15,63,104,.04);
  --shadow-sm:0 1px 2px rgba(15,63,104,.05), 0 1px 3px rgba(15,63,104,.04);
  --shadow-md:0 2px 6px rgba(15,63,104,.05), 0 6px 18px rgba(15,63,104,.06);
  --shadow-lg:0 4px 12px rgba(15,63,104,.06), 0 16px 36px rgba(15,63,104,.10);
  --ring:0 0 0 3px rgba(79,190,206,.22);
  --radius:14px; --radius-sm:10px; --radius-lg:18px;
  --ease:cubic-bezier(.4,0,.2,1);
  --font:"Montserrat",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg); color:var(--text); font-family:var(--font);
  font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  min-height:100vh; min-height:100dvh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;transition:all .18s var(--ease)}
button:active{transform:scale(.97)}
input{font-family:inherit;color:inherit}
::selection{background:rgba(79,190,206,.32); color:var(--cmc-navy)}

/* ═══════ Screens ═══════ */
.screen{display:none}
.screen.active{display:flex}

/* ═══════ Loading ═══════ */
.loading-screen{
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; min-height:100dvh; gap:14px;
}
.spinner{
  width:34px; height:34px; border:3px solid var(--border);
  border-top-color:var(--cmc-blue); border-radius:50%;
  animation:spin .7s linear infinite;
}
.spinner.sm{width:18px;height:18px;border-width:2.5px;border-color:rgba(255,255,255,.35);border-top-color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen p{font-size:13px;color:var(--text-dim);font-weight:500}

/* ═══════════════════════════════════════════
   LOGIN
   ═══════════════════════════════════════════ */
#login-screen{
  flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; min-height:100dvh; padding:24px 20px;
  background:
    radial-gradient(1200px 600px at 50% -100px, rgba(79,190,206,.18), transparent 60%),
    radial-gradient(900px 500px at 50% 110%, rgba(17,114,171,.10), transparent 60%),
    var(--bg);
}
.login-card{
  background:var(--panel); border-radius:20px; box-shadow:var(--shadow-lg);
  padding:36px 28px 28px; width:100%; max-width:400px;
  border:1px solid var(--border-soft);
}
.login-brand{display:flex; flex-direction:column; align-items:center; margin-bottom:26px}
.login-brand .logo{
  width:64px; height:64px; border-radius:16px; padding:6px;
  background:linear-gradient(180deg,#fff,#f7fbfd);
  border:1px solid var(--border); box-shadow:var(--shadow-sm);
  display:flex; align-items:center; justify-content:center;
}
.login-brand .logo img{width:100%;height:100%;object-fit:contain}
.login-brand h1{
  font-size:18px; font-weight:800; color:var(--cmc-navy);
  margin-top:14px; letter-spacing:-.2px;
}
.login-brand .tag{
  font-size:10px; color:var(--cmc-aqua); font-weight:700;
  letter-spacing:2px; text-transform:uppercase; margin-top:4px;
}

.form-group{margin-bottom:14px}
.form-group label{
  display:block; font-size:11px; font-weight:700; letter-spacing:.8px;
  color:var(--text-mute); margin-bottom:7px; text-transform:uppercase;
}
.form-group input{
  width:100%; padding:13px 15px; border:1.5px solid var(--border);
  border-radius:12px; font-size:16px; color:var(--text); background:var(--panel-2);
  transition:border-color .18s, box-shadow .18s, background-color .18s;
  font-weight:500; letter-spacing:.3px;
}
.form-group input::placeholder{color:var(--text-dim);font-weight:400}
.form-group input:hover{border-color:var(--cmc-aqua-dark);background:#fff}
.form-group input:focus{
  outline:none; border-color:var(--cmc-aqua); background:#fff; box-shadow:var(--ring);
}

.btn{
  width:100%; padding:14px; border-radius:12px;
  font-size:14px; font-weight:700; letter-spacing:.4px;
  display:flex; align-items:center; justify-content:center; gap:10px;
  transition:background-color .18s, box-shadow .18s, transform .12s;
}
.btn-primary{
  background:linear-gradient(135deg, var(--cmc-blue), var(--cmc-navy));
  color:#fff; box-shadow:0 4px 12px rgba(17,114,171,.28);
}
.btn-primary:hover{box-shadow:0 6px 18px rgba(17,114,171,.36)}
.btn-primary:disabled{opacity:.55; cursor:not-allowed; box-shadow:none}

.message{
  margin-top:12px; padding:11px 14px; border-radius:10px;
  font-size:12.5px; font-weight:600; text-align:center; display:none;
}
.message.error{background:var(--red-soft); color:var(--red)}
.message.info{background:var(--cmc-aqua-soft); color:var(--cmc-blue)}
.message.show{display:block}

/* OTP */
.otp-section{display:none}
.otp-section.show{display:block}
.otp-header{
  font-size:12.5px; color:var(--text-mute); text-align:center;
  margin:6px 0 16px; line-height:1.5;
}
.otp-header strong{color:var(--cmc-navy); font-weight:700}
.otp-boxes{display:flex; gap:8px; justify-content:center; margin-bottom:18px}
.otp-boxes input{
  width:46px; height:54px; text-align:center;
  font-size:22px; font-weight:700; color:var(--cmc-navy);
  border:1.5px solid var(--border); border-radius:12px;
  background:var(--panel-2); transition:all .18s var(--ease);
}
.otp-boxes input:focus{
  outline:none; border-color:var(--cmc-aqua); background:#fff; box-shadow:var(--ring);
  transform:translateY(-1px);
}
.otp-boxes input:not(:placeholder-shown){background:#fff; border-color:var(--cmc-aqua-dark)}
.resend-link{
  display:block; text-align:center; margin-top:14px; padding:8px;
  font-size:12px; color:var(--cmc-blue); font-weight:600; cursor:pointer;
  border-radius:8px; transition:background-color .15s;
}
.resend-link:hover{background:var(--cmc-aqua-soft)}

/* ═══════════════════════════════════════════
   DASHBOARD
   ═══════════════════════════════════════════ */
#dashboard-screen{flex-direction:column; min-height:100vh; min-height:100dvh}

.hero{
  background:
    radial-gradient(800px 400px at 10% -50%, rgba(79,190,206,.35), transparent 60%),
    linear-gradient(135deg, var(--cmc-navy) 0%, var(--cmc-blue) 100%);
  color:#fff; padding:22px 20px 32px;
  padding-top:max(22px, env(safe-area-inset-top));
  position:relative; overflow:hidden;
}
.hero::after{
  content:""; position:absolute; left:0; right:0; bottom:-1px; height:24px;
  background:linear-gradient(180deg, transparent, var(--bg));
  opacity:0; /* decorativo, soft transition */
}
.hero-top{
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:18px; gap:12px;
}
.hero-brand{display:flex; align-items:center; gap:10px}
.hero-brand .logo{
  width:36px; height:36px; border-radius:10px; padding:4px;
  background:rgba(255,255,255,.14); backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.2);
  display:flex; align-items:center; justify-content:center;
}
.hero-brand .logo img{width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1)}
.hero-brand .text{display:flex;flex-direction:column;line-height:1.1}
.hero-brand .text .top{font-size:8.5px;letter-spacing:2px;opacity:.72;font-weight:700;text-transform:uppercase}
.hero-brand .text .bot{font-size:12px;font-weight:700;letter-spacing:.5px;margin-top:2px}
.btn-logout{
  background:rgba(255,255,255,.14); color:#fff; backdrop-filter:blur(8px);
  padding:7px 14px; border-radius:22px; font-size:11.5px; font-weight:600;
  border:1px solid rgba(255,255,255,.18); letter-spacing:.3px;
  display:inline-flex; align-items:center; gap:6px;
}
.btn-logout:hover{background:rgba(255,255,255,.22)}
.hero-greeting{font-size:26px; font-weight:800; letter-spacing:-.5px; line-height:1.15}
.hero-meta{font-size:12px; margin-top:6px; opacity:.78; font-weight:500; letter-spacing:.2px}

.content{
  flex:1; max-width:560px; width:100%; margin:0 auto;
  padding:20px 16px calc(96px + env(safe-area-inset-bottom));
  margin-top:-14px; position:relative; z-index:1;
}

/* Secciones */
.section{margin-bottom:24px; animation:fadeInUp .35s var(--ease) both}
.section:nth-child(2){animation-delay:.05s}
.section:nth-child(3){animation-delay:.1s}
.section:nth-child(4){animation-delay:.15s}
@keyframes fadeInUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.section-head{
  display:flex; align-items:center; gap:10px; padding:0 4px;
  margin-bottom:12px;
}
.section-head .dot{
  width:8px; height:8px; border-radius:50%;
  background:var(--cmc-aqua); box-shadow:0 0 0 4px rgba(79,190,206,.2);
}
.section-head h2{
  font-size:13px; font-weight:800; color:var(--cmc-navy);
  letter-spacing:.5px; text-transform:uppercase; flex:1;
}
.section-head .count{
  font-size:11px; font-weight:700; color:var(--cmc-blue);
  background:var(--cmc-aqua-soft); padding:3px 10px; border-radius:20px;
  letter-spacing:.2px;
}

/* ═══ CARD: próxima cita (hero style) ═══ */
.appt-card{
  background:var(--panel); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-md); margin-bottom:10px;
  overflow:hidden; position:relative; border:1px solid var(--border-soft);
  transition:transform .2s var(--ease), box-shadow .2s var(--ease);
}
.appt-card:hover{transform:translateY(-1px); box-shadow:var(--shadow-lg)}

.appt-card .body{
  display:grid; grid-template-columns:78px 1fr; gap:14px;
  padding:16px 18px 16px 16px; align-items:center;
}

/* Tira de fecha estilo agenda */
.date-chip{
  background:linear-gradient(160deg, var(--cmc-aqua-soft), var(--cmc-blue-soft));
  border-radius:14px; padding:10px 6px 12px;
  text-align:center; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:2px;
  position:relative; overflow:hidden;
  border:1px solid rgba(79,190,206,.25);
}
.date-chip::before{
  content:""; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--cmc-aqua), var(--cmc-blue));
}
.date-chip .dow{
  font-size:10px; font-weight:800; letter-spacing:1.2px;
  color:var(--cmc-blue); text-transform:uppercase;
}
.date-chip .day{
  font-size:28px; font-weight:800; color:var(--cmc-navy);
  line-height:1; font-feature-settings:"tnum"; letter-spacing:-1px;
}
.date-chip .month{
  font-size:9.5px; font-weight:700; letter-spacing:1.5px;
  color:var(--text-mute); text-transform:uppercase; margin-top:1px;
}

.appt-info{min-width:0; display:flex; flex-direction:column; gap:4px}
.appt-specialty{
  font-size:11px; font-weight:700; letter-spacing:.4px;
  text-transform:uppercase; color:var(--cmc-blue);
  display:inline-flex; align-items:center; gap:5px;
}
.appt-time{
  font-size:20px; font-weight:800; color:var(--cmc-navy);
  line-height:1.1; font-feature-settings:"tnum";
  display:flex; align-items:baseline; gap:6px;
}
.appt-time .hrs{font-size:11px; font-weight:600; color:var(--text-dim); letter-spacing:.5px}
.appt-prof{
  font-size:13px; color:var(--text-mute); font-weight:500;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.appt-when{
  display:inline-flex; align-items:center; gap:5px;
  font-size:10.5px; font-weight:700; letter-spacing:.3px;
  padding:3px 9px; border-radius:20px; margin-top:2px;
  width:fit-content; text-transform:uppercase;
}
.appt-when.today{background:var(--green); color:#fff; box-shadow:0 2px 6px rgba(37,211,102,.3)}
.appt-when.tomorrow{background:#fff3cd; color:#8b6508}
.appt-when.soon{background:var(--cmc-aqua-soft); color:var(--cmc-blue)}
.appt-when.later{background:var(--panel-2); color:var(--text-mute)}

/* ═══ CARD: historial (compacto) ═══ */
.history-card{
  background:var(--panel); border-radius:var(--radius); padding:12px 14px;
  box-shadow:var(--shadow-xs); margin-bottom:8px;
  border:1px solid var(--border-soft);
  display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center;
  transition:background-color .15s;
}
.history-card:hover{background:var(--panel-2)}
.history-info{min-width:0; display:flex; flex-direction:column; gap:2px}
.history-date{
  font-size:12.5px; font-weight:700; color:var(--cmc-navy);
  letter-spacing:.2px;
}
.history-prof{
  font-size:12px; color:var(--text-mute); font-weight:500;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.history-right{display:flex; flex-direction:column; align-items:flex-end; gap:3px}
.history-time{
  font-size:13px; font-weight:700; color:var(--cmc-blue);
  font-feature-settings:"tnum";
}
.history-spec{
  font-size:9.5px; font-weight:700; letter-spacing:.6px;
  text-transform:uppercase; color:var(--text-dim);
  padding:2px 7px; border-radius:12px; background:var(--panel-2);
}

.historial-toggle{
  background:none; color:var(--cmc-blue); padding:10px 4px;
  font-size:12px; font-weight:700; letter-spacing:.3px;
  display:flex; align-items:center; gap:4px;
  margin-top:4px;
}
.historial-toggle:hover{color:var(--cmc-navy)}
.historial-rest{display:none}
.historial-rest.open{display:block; animation:fadeInUp .25s var(--ease)}

/* ═══ Diagnósticos ═══ */
.dx-list{display:flex; flex-wrap:wrap; gap:7px}
.dx-chip{
  display:inline-flex; align-items:center; gap:6px;
  font-size:11.5px; font-weight:700; letter-spacing:.3px;
  padding:7px 13px; border-radius:22px;
  background:var(--amber-soft); color:#8b6508;
  border:1px solid #f0e1b4;
}
.dx-chip::before{
  content:""; width:6px; height:6px; border-radius:50%;
  background:var(--amber);
}

/* ═══ Empty state ═══ */
.empty{
  text-align:center; padding:28px 18px;
  background:var(--panel); border-radius:var(--radius);
  border:1px dashed var(--border);
}
.empty-icon{
  width:48px; height:48px; margin:0 auto 10px;
  display:flex; align-items:center; justify-content:center;
  background:var(--cmc-aqua-soft); border-radius:50%;
  color:var(--cmc-blue);
}
.empty-icon svg{width:24px;height:24px}
.empty p{font-size:13px; color:var(--text-mute); font-weight:500}
.empty p.sub{font-size:11.5px; color:var(--text-dim); margin-top:3px; font-weight:400}

/* ═══ CTA flotante ═══ */
.cta-float{
  position:fixed; left:0; right:0; bottom:0;
  padding:14px 16px; padding-bottom:max(14px, env(safe-area-inset-bottom));
  background:linear-gradient(to top, var(--bg) 65%, rgba(243,246,249,0));
  z-index:10; pointer-events:none;
}
.cta-float > *{pointer-events:auto}
.btn-whatsapp{
  width:100%; max-width:528px; margin:0 auto; padding:15px 20px;
  background:linear-gradient(135deg, #25d366, #128c7e);
  color:#fff; border-radius:16px;
  font-size:14.5px; font-weight:700; letter-spacing:.4px;
  display:flex; align-items:center; justify-content:center; gap:10px;
  box-shadow:0 6px 20px rgba(18,140,126,.35), 0 2px 6px rgba(18,140,126,.2);
}
.btn-whatsapp:hover{box-shadow:0 8px 26px rgba(18,140,126,.45)}
.btn-whatsapp svg{width:20px; height:20px; fill:#fff}

/* ═══ Responsive ═══ */
@media (min-width:720px){
  .hero{padding:34px 32px 44px}
  .hero-greeting{font-size:32px}
  .content{padding:28px 24px 120px}
  .appt-card .body{grid-template-columns:92px 1fr; padding:18px 22px 18px 18px; gap:18px}
  .date-chip .day{font-size:32px}
}
</style>
</head>
<body>

<!-- ══ Loading ══ -->
<div id="loading-screen" class="loading-screen">
  <div class="spinner"></div>
  <p>Cargando portal…</p>
</div>

<!-- ══ Login ══ -->
<div id="login-screen" class="screen">
  <div class="login-card">
    <div class="login-brand">
      <div class="logo"><img src="/static/isotipo.png" alt="CMC" onerror="this.src='/static/logo.png'"></div>
      <h1>Portal del Paciente</h1>
      <span class="tag">Centro Médico Carampangue</span>
    </div>

    <div id="step-rut">
      <div class="form-group">
        <label for="rut-input">Tu RUT</label>
        <input type="text" id="rut-input" placeholder="12.345.678-9"
               inputmode="text" autocomplete="off" maxlength="12">
      </div>
      <button class="btn btn-primary" id="btn-send-code" onclick="requestCode()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Enviar código por WhatsApp
      </button>
    </div>

    <div class="otp-section" id="otp-section">
      <div class="otp-header">
        Ingresa el código de 6 dígitos<br>que recibiste en <strong id="otp-target">WhatsApp</strong>
      </div>
      <div class="otp-boxes" id="otp-boxes">
        <input type="text" inputmode="numeric" maxlength="1" placeholder="•" data-idx="0">
        <input type="text" inputmode="numeric" maxlength="1" placeholder="•" data-idx="1">
        <input type="text" inputmode="numeric" maxlength="1" placeholder="•" data-idx="2">
        <input type="text" inputmode="numeric" maxlength="1" placeholder="•" data-idx="3">
        <input type="text" inputmode="numeric" maxlength="1" placeholder="•" data-idx="4">
        <input type="text" inputmode="numeric" maxlength="1" placeholder="•" data-idx="5">
      </div>
      <button class="btn btn-primary" id="btn-verify" onclick="verifyCode()">Verificar</button>
      <span class="resend-link" onclick="requestCode()">Reenviar código</span>
    </div>

    <div class="message error" id="error-msg"></div>
    <div class="message info" id="info-msg"></div>
  </div>
</div>

<!-- ══ Dashboard ══ -->
<div id="dashboard-screen" class="screen">
  <div class="hero">
    <div class="hero-top">
      <div class="hero-brand">
        <div class="logo"><img src="/static/isotipo.png" alt="CMC" onerror="this.src='/static/logo.png'"></div>
        <div class="text">
          <span class="top">Centro Médico</span>
          <span class="bot">Carampangue</span>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </button>
    </div>
    <div class="hero-greeting" id="dash-greeting">Hola</div>
    <div class="hero-meta" id="dash-subtitle"></div>
  </div>

  <div class="content" id="dash-content"></div>

  <div class="cta-float">
    <button class="btn-whatsapp" id="btn-agendar" onclick="agendar()">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Agendar nueva cita
    </button>
  </div>
</div>

<script>
// ══ State ══
let currentRut = '';
let patientData = null;

const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const DIAS = ['dom','lun','mar','mié','jue','vie','sáb'];

// ══ Init ══
(async function init() {
  try {
    const r = await fetch('/portal/api/datos', { credentials: 'same-origin' });
    if (r.ok) {
      patientData = await r.json();
      showDashboard();
    } else {
      showLogin();
    }
  } catch { showLogin(); }
})();

function showLogin() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('dashboard-screen').classList.remove('active');
  document.getElementById('rut-input').focus();
}
function showDashboard() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('dashboard-screen').classList.add('active');
  renderDashboard();
}

// ══ RUT formatter ══
document.getElementById('rut-input').addEventListener('input', function(e) {
  let v = e.target.value.replace(/[^0-9kK]/g, '').toUpperCase();
  if (v.length > 9) v = v.slice(0, 9);
  if (v.length > 1) {
    const dv = v.slice(-1);
    const body = v.slice(0, -1);
    let formatted = '';
    const reversed = body.split('').reverse();
    for (let i = 0; i < reversed.length; i++) {
      if (i > 0 && i % 3 === 0) formatted = '.' + formatted;
      formatted = reversed[i] + formatted;
    }
    e.target.value = formatted + '-' + dv;
  }
});
document.getElementById('rut-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') requestCode();
});

// ══ OTP ══
const otpInputs = document.querySelectorAll('#otp-boxes input');
otpInputs.forEach((inp, i) => {
  inp.addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '');
    if (this.value && i < 5) otpInputs[i + 1].focus();
    if (i === 5 && this.value) {
      const code = Array.from(otpInputs).map(x => x.value).join('');
      if (code.length === 6) verifyCode();
    }
  });
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !this.value && i > 0) otpInputs[i - 1].focus();
  });
  inp.addEventListener('paste', function(e) {
    e.preventDefault();
    const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
    for (let j = 0; j < 6 && j < paste.length; j++) otpInputs[j].value = paste[j];
    if (paste.length >= 6) verifyCode();
    else if (paste.length > 0) otpInputs[Math.min(paste.length, 5)].focus();
  });
});

// ══ API ══
async function requestCode() {
  const rut = document.getElementById('rut-input').value.trim();
  if (!rut || rut.length < 9) { showError('Ingresa un RUT válido'); return; }
  currentRut = rut;
  const btn = document.getElementById('btn-send-code');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner sm"></span>';
  hideMessages();

  try {
    const r = await fetch('/portal/api/request-code', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rut }),
    });
    const data = await r.json();
    if (!r.ok) {
      showError(data.detail || 'Error enviando código');
      btn.disabled = false;
      btn.innerHTML = '<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> Enviar código por WhatsApp';
      return;
    }
    document.getElementById('step-rut').style.display = 'none';
    document.getElementById('otp-section').classList.add('show');
    if (data.rut_masked) document.getElementById('otp-target').textContent = 'WhatsApp (' + data.rut_masked + ')';
    showInfo('Código enviado a tu WhatsApp');
    otpInputs.forEach(x => x.value = '');
    otpInputs[0].focus();
  } catch { showError('Error de conexión'); }
  btn.disabled = false;
}

async function verifyCode() {
  const code = Array.from(otpInputs).map(x => x.value).join('');
  if (code.length !== 6) { showError('Ingresa los 6 dígitos'); return; }
  const btn = document.getElementById('btn-verify');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner sm"></span>';
  hideMessages();

  try {
    const r = await fetch('/portal/api/verify-code', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rut: currentRut, code }),
      credentials: 'same-origin',
    });
    const data = await r.json();
    if (!r.ok) {
      showError(data.detail || 'Código incorrecto');
      btn.disabled = false; btn.textContent = 'Verificar';
      otpInputs.forEach(x => x.value = ''); otpInputs[0].focus();
      return;
    }
    const r2 = await fetch('/portal/api/datos', { credentials: 'same-origin' });
    if (r2.ok) { patientData = await r2.json(); showDashboard(); }
    else showError('Error cargando datos');
  } catch { showError('Error de conexión'); }
  btn.disabled = false; btn.textContent = 'Verificar';
}

async function doLogout() {
  await fetch('/portal/api/logout', { method: 'POST', credentials: 'same-origin' });
  patientData = null;
  document.getElementById('step-rut').style.display = 'block';
  document.getElementById('otp-section').classList.remove('show');
  document.getElementById('rut-input').value = '';
  hideMessages();
  showLogin();
}

function agendar() {
  if (patientData && patientData.whatsapp_url) window.open(patientData.whatsapp_url, '_blank');
}

// ══ Date helpers ══
function parseCitaDate(fechaStr) {
  // Recibe "YYYY-MM-DD"
  if (!fechaStr) return null;
  const [y, m, d] = fechaStr.split('-').map(n => parseInt(n, 10));
  return new Date(y, m - 1, d);
}
function daysUntil(fechaStr) {
  const target = parseCitaDate(fechaStr);
  if (!target) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}
function whenBadge(fechaStr) {
  const d = daysUntil(fechaStr);
  if (d === null) return null;
  if (d === 0) return { cls:'today', label:'Hoy' };
  if (d === 1) return { cls:'tomorrow', label:'Mañana' };
  if (d > 1 && d <= 7) return { cls:'soon', label:`En ${d} días` };
  if (d > 7) return { cls:'later', label:`En ${d} días` };
  return null;
}
function dateChip(fechaStr) {
  const d = parseCitaDate(fechaStr);
  if (!d) return { dow:'—', day:'—', month:'—' };
  return {
    dow: DIAS[d.getDay()],
    day: d.getDate(),
    month: MESES[d.getMonth()],
  };
}
function fmtHistoryDate(fechaStr) {
  const d = parseCitaDate(fechaStr);
  if (!d) return fechaStr;
  return `${DIAS[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]} ${d.getFullYear()}`;
}

// ══ Render dashboard ══
function renderDashboard() {
  if (!patientData) return;
  const d = patientData;

  const firstName = (d.nombre || '').split(' ')[0];
  document.getElementById('dash-greeting').textContent = firstName ? `Hola, ${firstName}` : 'Hola';
  document.getElementById('dash-subtitle').textContent = d.rut ? `RUT ${d.rut}` : '';

  const c = document.getElementById('dash-content');
  let html = '';

  // Próximas citas
  html += `<div class="section">
    <div class="section-head">
      <span class="dot"></span>
      <h2>Próximas citas</h2>
      <span class="count">${d.citas_futuras.length}</span>
    </div>`;

  if (d.citas_futuras.length === 0) {
    html += `<div class="empty">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <p>No tienes citas agendadas</p>
      <p class="sub">Agenda por WhatsApp con el botón de abajo</p>
    </div>`;
  } else {
    for (const cita of d.citas_futuras) {
      const chip = dateChip(cita.fecha);
      const when = whenBadge(cita.fecha);
      html += `<div class="appt-card"><div class="body">
        <div class="date-chip">
          <span class="dow">${chip.dow}</span>
          <span class="day">${chip.day}</span>
          <span class="month">${chip.month}</span>
        </div>
        <div class="appt-info">
          ${cita.especialidad ? `<span class="appt-specialty">${cita.especialidad}</span>` : ''}
          <span class="appt-time">${cita.hora_inicio} <span class="hrs">HRS</span></span>
          <span class="appt-prof">${cita.profesional || 'Profesional'}</span>
          ${when ? `<span class="appt-when ${when.cls}">${when.label}</span>` : ''}
        </div>
      </div></div>`;
    }
  }
  html += `</div>`;

  // Diagnósticos
  if (d.diagnosticos && d.diagnosticos.length > 0) {
    html += `<div class="section">
      <div class="section-head">
        <span class="dot" style="background:var(--amber); box-shadow:0 0 0 4px rgba(181,129,5,.2)"></span>
        <h2>Mis diagnósticos</h2>
      </div>
      <div class="dx-list">
        ${d.diagnosticos.map(dx => `<span class="dx-chip">${dx}</span>`).join('')}
      </div>
    </div>`;
  }

  // Historial
  html += `<div class="section">
    <div class="section-head">
      <span class="dot" style="background:var(--cmc-navy); box-shadow:0 0 0 4px rgba(15,63,104,.18)"></span>
      <h2>Historial de atenciones</h2>
      <span class="count">${d.historial.length}</span>
    </div>`;

  if (d.historial.length === 0) {
    html += `<div class="empty">
      <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
      <p>Sin atenciones recientes</p>
    </div>`;
  } else {
    const show = d.historial.slice(0, 3);
    const rest = d.historial.slice(3);
    const renderHist = (c) => `<div class="history-card">
      <div class="history-info">
        <span class="history-date">${fmtHistoryDate(c.fecha)}</span>
        <span class="history-prof">${c.profesional || 'Profesional'}</span>
      </div>
      <div class="history-right">
        <span class="history-time">${c.hora_inicio}</span>
        ${c.especialidad ? `<span class="history-spec">${c.especialidad}</span>` : ''}
      </div>
    </div>`;
    for (const c of show) html += renderHist(c);
    if (rest.length > 0) {
      html += `<button class="historial-toggle" onclick="toggleHistorial()">
        <span id="hist-toggle-label">Ver ${rest.length} más</span>
        <svg id="hist-toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="historial-rest" id="historial-rest">
        ${rest.map(renderHist).join('')}
      </div>`;
    }
  }
  html += `</div>`;

  c.innerHTML = html;
}

function toggleHistorial() {
  const list = document.getElementById('historial-rest');
  const label = document.getElementById('hist-toggle-label');
  const icon = document.getElementById('hist-toggle-icon');
  if (list.classList.contains('open')) {
    list.classList.remove('open');
    label.textContent = `Ver ${patientData.historial.length - 3} más`;
    icon.style.transform = 'rotate(0deg)';
  } else {
    list.classList.add('open');
    label.textContent = 'Ver menos';
    icon.style.transform = 'rotate(180deg)';
  }
}

// ══ Messages ══
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('info-msg').classList.remove('show');
}
function showInfo(msg) {
  const el = document.getElementById('info-msg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('error-msg').classList.remove('show');
}
function hideMessages() {
  document.getElementById('error-msg').classList.remove('show');
  document.getElementById('info-msg').classList.remove('show');
}
</script>
</body>
</html>
