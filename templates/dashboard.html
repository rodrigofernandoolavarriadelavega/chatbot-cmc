<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>Dashboard KPIs — CMC</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<style>
:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --text-2: #475569;
  --text-3: #94a3b8;
  --primary: #1172AB;
  --red: #ef4444;
  --red-soft: #fef2f2;
  --amber: #f59e0b;
  --amber-soft: #fffbeb;
  --green: #10b981;
  --green-soft: #f0fdf4;
  --blue: #3b82f6;
  --blue-soft: #eff6ff;
  --purple: #8b5cf6;
  --purple-soft: #f5f3ff;
  --cyan: #06b6d4;
  --cyan-soft: #ecfeff;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: "Inter", system-ui, sans-serif;
  font-size: 14px; line-height: 1.5;
}

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow);
  position: sticky; top: 0; z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 18px; font-weight: 700; }
.header .subtitle { font-size: 13px; color: var(--text-3); }
.back-link {
  color: var(--primary); text-decoration: none; font-size: 13px; font-weight: 500;
  display: flex; align-items: center; gap: 4px;
}
.back-link:hover { text-decoration: underline; }
.periodo-select {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
  font-size: 13px; font-family: inherit; background: var(--surface);
  cursor: pointer;
}

/* CONTAINER */
.container {
  max-width: 1280px; margin: 0 auto;
  padding: 24px;
}

/* KPI CARDS */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  transition: transform .15s;
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.kpi-label {
  font-size: 12px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .5px; color: var(--text-3); margin-bottom: 8px;
}
.kpi-value {
  font-size: 32px; font-weight: 800; line-height: 1;
}
.kpi-sub {
  font-size: 12px; color: var(--text-2); margin-top: 6px;
}
.kpi-card.green .kpi-value { color: var(--green); }
.kpi-card.blue .kpi-value { color: var(--blue); }
.kpi-card.purple .kpi-value { color: var(--purple); }
.kpi-card.amber .kpi-value { color: var(--amber); }
.kpi-card.red .kpi-value { color: var(--red); }
.kpi-card.cyan .kpi-value { color: var(--cyan); }
.kpi-card.primary .kpi-value { color: var(--primary); }

/* CHART SECTIONS */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 20px; margin-bottom: 24px;
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}
.chart-card h3 {
  font-size: 14px; font-weight: 700; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.chart-wrap { position: relative; height: 260px; }

/* TABLES */
.table-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.table-card h3 {
  font-size: 14px; font-weight: 700; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.data-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.data-table th {
  text-align: left; padding: 8px 12px; border-bottom: 2px solid var(--border);
  font-weight: 600; color: var(--text-2); font-size: 11px;
  text-transform: uppercase; letter-spacing: .5px;
}
.data-table td {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover { background: #f8fafc; }

/* FUNNEL */
.funnel { margin-top: 8px; }
.funnel-step {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px;
}
.funnel-bar-wrap {
  flex: 1; height: 32px; background: #f1f5f9; border-radius: 6px;
  overflow: hidden; position: relative;
}
.funnel-bar {
  height: 100%; border-radius: 6px;
  display: flex; align-items: center; padding: 0 10px;
  font-size: 12px; font-weight: 600; color: #fff;
  min-width: 40px; transition: width .6s ease;
}
.funnel-label {
  width: 140px; font-size: 12px; font-weight: 500; color: var(--text-2);
  text-align: right; flex-shrink: 0;
}
.funnel-count {
  width: 50px; font-size: 13px; font-weight: 700; text-align: right; flex-shrink: 0;
}

/* SEGURIDAD BADGE */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
}
.badge.green { background: var(--green-soft); color: #15803d; }
.badge.red { background: var(--red-soft); color: var(--red); }
.badge.amber { background: var(--amber-soft); color: #92400e; }

/* LOADING */
.loading {
  display: flex; align-items: center; justify-content: center;
  height: 300px; color: var(--text-3); font-size: 14px;
}
.spinner {
  width: 24px; height: 24px; border: 3px solid var(--border);
  border-top-color: var(--primary); border-radius: 50%;
  animation: spin .7s linear infinite; margin-right: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* MAP SECTIONS */
.map-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px; margin-bottom: 24px;
}
.map-section .chart-card { min-height: 420px; }
.map-wrap {
  width: 100%; height: 380px; border-radius: 8px;
  border: 1px solid var(--border); overflow: hidden;
}
.map-section-title {
  font-size: 16px; font-weight: 700; margin-bottom: 16px;
  padding-bottom: 8px; border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.map-controls {
  display: flex; gap: 6px; margin-bottom: 10px;
}
.map-controls button {
  padding: 4px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface);
  font-size: 12px; font-family: inherit; cursor: pointer;
  color: var(--text-2); transition: all .15s;
}
.map-controls button:hover { background: var(--bg); }
.map-controls button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.comuna-bar { height: 6px; border-radius: 3px; display: inline-block; vertical-align: middle; }
.comuna-bar-bg { height: 6px; background: var(--bg); border-radius: 3px; width: 80px; display: inline-block; vertical-align: middle; overflow: hidden; }
.leaflet-popup-content { font-size: 13px; font-family: "Inter", system-ui, sans-serif; }
.marker-cluster-small { background-color: rgba(59,130,246,0.5); }
.marker-cluster-small div { background-color: rgba(59,130,246,0.7); color:#fff; }
.marker-cluster-medium { background-color: rgba(245,158,11,0.5); }
.marker-cluster-medium div { background-color: rgba(245,158,11,0.7); color:#fff; }
.marker-cluster-large { background-color: rgba(239,68,68,0.5); }
.marker-cluster-large div { background-color: rgba(239,68,68,0.7); color:#fff; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .container { padding: 12px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .charts-grid { grid-template-columns: 1fr; }
  .map-section { grid-template-columns: 1fr; }
  .kpi-value { font-size: 24px; }
  .header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <h1>Dashboard KPIs — Centro Medico Carampangue</h1>
      <div class="subtitle" id="periodo-label">Cargando...</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <select class="periodo-select" id="periodo-select" onchange="loadData()">
      <option value="7">Últimos 7 días</option>
      <option value="30" selected>Últimos 30 días</option>
      <option value="90">Últimos 90 días</option>
      <option value="365">Último año</option>
    </select>
    <a href="/admin" class="back-link">← Panel admin</a>
  </div>
</div>

<div class="container" id="main-content">
  <div class="loading"><div class="spinner"></div> Cargando métricas...</div>
</div>

<script>
const TOKEN = "__TOKEN__";

function apiUrl(path) {
  if (TOKEN) return path + (path.includes('?') ? '&' : '?') + 'token=' + TOKEN;
  return path;
}

function fetchApi(path) {
  const opts = {};
  if (!TOKEN) opts.credentials = 'include';
  return fetch(apiUrl(path), opts).then(r => r.json());
}

let charts = {};

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
}

async function loadData() {
  const dias = document.getElementById('periodo-select').value;
  const data = await fetchApi('/admin/api/case-study?dias=' + dias);
  document.getElementById('periodo-label').textContent =
    `Período: últimos ${dias} días`;
  destroyCharts();
  render(data);
}

function render(d) {
  const r = d.resumen;
  const f = d.funnel_agendamiento;
  const conf = d.confirmacion_precita;
  const cs = d.crosssell;
  const reg = d.registro_pacientes;
  const fid = d.fidelizacion;
  const seg = d.seguridad;

  document.getElementById('main-content').innerHTML = `
    <!-- KPI CARDS -->
    <div class="kpi-grid">
      <div class="kpi-card primary">
        <div class="kpi-label">Conversaciones</div>
        <div class="kpi-value">${r.conversaciones_unicas}</div>
        <div class="kpi-sub">Pacientes únicos</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Citas agendadas</div>
        <div class="kpi-value">${r.citas_agendadas}</div>
        <div class="kpi-sub">Por el bot</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">Conversión</div>
        <div class="kpi-value">${r.tasa_conversion}</div>
        <div class="kpi-sub">Intent → cita creada</div>
      </div>
      <div class="kpi-card cyan">
        <div class="kpi-label">Confirmación pre-cita</div>
        <div class="kpi-value">${conf.tasa_confirmacion}</div>
        <div class="kpi-sub">${conf.confirmados} de ${conf.total_recordatorios_enviados} confirmaron</div>
      </div>
      <div class="kpi-card purple">
        <div class="kpi-label">No-shows evitados</div>
        <div class="kpi-value">${conf.noshows_evitados}</div>
        <div class="kpi-sub">Cancelaron o reagendaron a tiempo</div>
      </div>
      <div class="kpi-card amber">
        <div class="kpi-label">Derivaciones humano</div>
        <div class="kpi-value">${r.derivaciones_humano}</div>
        <div class="kpi-sub">Escaladas a recepción</div>
      </div>
    </div>

    <!-- CHARTS ROW 1 -->
    <div class="charts-grid">
      <!-- FUNNEL -->
      <div class="chart-card">
        <h3>Funnel de agendamiento</h3>
        <div class="funnel" id="funnel-container"></div>
      </div>
      <!-- ESPECIALIDADES -->
      <div class="chart-card">
        <h3>Especialidades más solicitadas</h3>
        <div class="chart-wrap"><canvas id="chart-esp"></canvas></div>
      </div>
    </div>

    <!-- CHARTS ROW 2 -->
    <div class="charts-grid">
      <!-- HORAS PICO -->
      <div class="chart-card">
        <h3>Horarios pico de mensajes</h3>
        <div class="chart-wrap"><canvas id="chart-horas"></canvas></div>
      </div>
      <!-- CONFIRMACIONES -->
      <div class="chart-card">
        <h3>Confirmaciones pre-cita</h3>
        <div class="chart-wrap"><canvas id="chart-conf"></canvas></div>
      </div>
    </div>

    <!-- ROW 3: TABLES -->
    <div class="charts-grid">
      <!-- FIDELIZACIÓN -->
      <div class="table-card">
        <h3>Fidelización por campaña</h3>
        <table class="data-table">
          <thead><tr><th>Campaña</th><th>Enviados</th><th>Respondidos</th><th>Tasa</th></tr></thead>
          <tbody id="fidel-tbody"></tbody>
        </table>
        ${Object.keys(fid.postconsulta_desglose).length ? `
        <h3 style="margin-top:16px">Post-consulta: ¿Cómo se siente?</h3>
        <div class="chart-wrap" style="height:180px"><canvas id="chart-postconsulta"></canvas></div>
        ` : ''}
      </div>

      <!-- CROSS-SELL -->
      <div class="table-card">
        <h3>Cross-sell & upsell</h3>
        <table class="data-table">
          <thead><tr><th>Métrica</th><th>Valor</th></tr></thead>
          <tbody>
            <tr><td>Upsell post-consulta ofrecidos</td><td><strong>${cs.upsell_ofrecidos}</strong></td></tr>
            <tr><td>Upsell aceptados</td><td><strong>${cs.upsell_aceptados}</strong></td></tr>
            <tr><td>Tasa conversión upsell</td><td><span class="badge ${parseFloat(cs.tasa_upsell)>10?'green':'amber'}">${cs.tasa_upsell}</span></td></tr>
            <tr><td>FAQ → agendar (aceptados)</td><td><strong>${cs.faq_to_agendar_aceptados}</strong></td></tr>
            <tr><td>FAQ → agendar (rechazados)</td><td><strong>${cs.faq_to_agendar_rechazados}</strong></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ROW 4 -->
    <div class="charts-grid">
      <!-- REFERRAL -->
      <div class="table-card">
        <h3>¿Cómo nos conocieron?</h3>
        ${Object.keys(d.referral).length ? `
        <table class="data-table">
          <thead><tr><th>Fuente</th><th>Pacientes</th></tr></thead>
          <tbody id="referral-tbody"></tbody>
        </table>
        ` : '<div style="color:var(--text-3);font-size:13px;padding:20px 0;text-align:center">Sin datos de referral aún</div>'}
      </div>

      <!-- CANALES -->
      <div class="table-card">
        <h3>Canales de mensajería</h3>
        <table class="data-table">
          <thead><tr><th>Canal</th><th>Usuarios</th><th>Mensajes</th></tr></thead>
          <tbody id="canales-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- ROW 5 -->
    <div class="charts-grid">
      <!-- REGISTRO -->
      <div class="table-card">
        <h3>Registro de pacientes nuevos</h3>
        <table class="data-table">
          <thead><tr><th>Métrica</th><th>Valor</th></tr></thead>
          <tbody>
            <tr><td>Completados</td><td><strong>${reg.completados}</strong></td></tr>
            <tr><td>Abandonados</td><td><strong>${reg.abandonados}</strong></td></tr>
            <tr><td>Tasa completado</td><td><span class="badge ${parseFloat(reg.tasa_completado)>=50?'green':'amber'}">${reg.tasa_completado}</span></td></tr>
          </tbody>
        </table>
      </div>

      <!-- SEGURIDAD -->
      <div class="table-card">
        <h3>Seguridad clínica</h3>
        <table class="data-table">
          <thead><tr><th>Evento</th><th>Detecciones</th><th>Estado</th></tr></thead>
          <tbody>
            <tr>
              <td>Emergencias detectadas</td>
              <td><strong>${seg.emergencias}</strong></td>
              <td><span class="badge green">Derivadas a SAMU 131</span></td>
            </tr>
            <tr>
              <td>Crisis salud mental</td>
              <td><strong>${seg.crisis_salud_mental}</strong></td>
              <td><span class="badge green">Derivadas a Salud Responde</span></td>
            </tr>
          </tbody>
        </table>
        ${d.triage_ges.match + d.triage_ges.nomatch > 0 ? `
        <h3 style="margin-top:16px">Triage GES</h3>
        <table class="data-table">
          <thead><tr><th>Métrica</th><th>Valor</th></tr></thead>
          <tbody>
            <tr><td>Síntomas reconocidos</td><td><strong>${d.triage_ges.match}</strong></td></tr>
            <tr><td>Sin match</td><td><strong>${d.triage_ges.nomatch}</strong></td></tr>
            <tr><td>Cobertura</td><td><span class="badge ${parseFloat(d.triage_ges.cobertura)>=80?'green':'amber'}">${d.triage_ges.cobertura}</span></td></tr>
          </tbody>
        </table>
        ` : ''}
      </div>
    </div>

    <!-- MAP: COMUNAS -->
    <div class="map-section">
      <div class="chart-card">
        <div class="map-section-title">Mapa por Comunas</div>
        <div class="map-wrap" id="map-comunas"></div>
      </div>
      <div class="chart-card">
        <div class="map-section-title">Distribución geográfica</div>
        <table class="data-table">
          <thead><tr><th>#</th><th>Comuna</th><th>Pacientes</th><th>%</th><th></th></tr></thead>
          <tbody id="tabla-comunas-dash"></tbody>
        </table>
        <h3 style="margin-top:20px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px">Localidades de Arauco</h3>
        <table class="data-table" style="margin-top:8px">
          <thead><tr><th>#</th><th>Localidad</th><th>Pacientes</th><th>%</th><th></th></tr></thead>
          <tbody id="tabla-localidades-dash"></tbody>
        </table>
      </div>
    </div>

    <!-- MAP: DIRECCIONES -->
    <div class="map-section">
      <div class="chart-card">
        <div class="map-section-title">Mapa de Direcciones</div>
        <div class="map-controls">
          <button class="active" onclick="toggleDirLayer('clusters',this)">Clusters</button>
          <button onclick="toggleDirLayer('heat',this)">Calor</button>
          <button onclick="toggleDirLayer('points',this)">Puntos</button>
        </div>
        <div class="map-wrap" id="map-direcciones"></div>
      </div>
      <div class="chart-card">
        <div class="map-section-title">Resumen direcciones</div>
        <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">
          <div class="kpi-card blue" style="padding:14px">
            <div class="kpi-label" style="font-size:10px">Direcciones</div>
            <div class="kpi-value" style="font-size:24px">198</div>
          </div>
          <div class="kpi-card green" style="padding:14px">
            <div class="kpi-label" style="font-size:10px">Pacientes</div>
            <div class="kpi-value" style="font-size:24px">250</div>
          </div>
          <div class="kpi-card purple" style="padding:14px">
            <div class="kpi-label" style="font-size:10px">Citas</div>
            <div class="kpi-value" style="font-size:24px">326</div>
          </div>
        </div>
        <h3 style="font-size:13px;font-weight:700;margin-bottom:8px">Top direcciones</h3>
        <table class="data-table">
          <thead><tr><th>Dirección</th><th>Pac.</th><th>Citas</th></tr></thead>
          <tbody id="tabla-direcciones-dash"></tbody>
        </table>
      </div>
    </div>
  `;

  // ── FUNNEL ──
  const funnelSteps = [
    { label: 'Intent agendar', value: f.intent_agendar, color: '#3b82f6' },
    { label: 'Citas creadas', value: f.citas_creadas, color: '#10b981' },
    { label: 'Sin disponibilidad', value: f.sin_disponibilidad, color: '#f59e0b' },
    { label: 'Lista de espera', value: f.waitlist_inscritos, color: '#8b5cf6' },
    { label: 'Waitlist notificados', value: f.waitlist_notificados, color: '#06b6d4' },
  ];
  const maxFunnel = Math.max(...funnelSteps.map(s => s.value), 1);
  const fc = document.getElementById('funnel-container');
  if (fc) {
    fc.innerHTML = funnelSteps.map(s => `
      <div class="funnel-step">
        <div class="funnel-label">${s.label}</div>
        <div class="funnel-bar-wrap">
          <div class="funnel-bar" style="width:${Math.max(s.value/maxFunnel*100,4)}%;background:${s.color}">
            ${s.value}
          </div>
        </div>
      </div>
    `).join('');
  }

  // ── ESPECIALIDADES (doughnut) ──
  const espLabels = d.especialidades_top.map(e => e.especialidad);
  const espData = d.especialidades_top.map(e => e.citas);
  const espColors = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#f97316','#ec4899'];
  const espCtx = document.getElementById('chart-esp');

      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { font: { family: 'Inter', size: 12 }, padding: 12 } }
        }
      }
    });
  }

  // ── HORAS PICO (bar) ──
  const horasCtx = document.getElementById('chart-horas');
  if (horasCtx && d.horas_pico.length) {
    const sortedHoras = [...d.horas_pico].sort((a,b) => a.hora - b.hora);
    charts.horas = new Chart(horasCtx, {
      type: 'bar',
      data: {
        labels: sortedHoras.map(h => `${String(h.hora).padStart(2,'0')}:00`),
        datasets: [{
          label: 'Mensajes',

        }]
      },

        responsive: true, maintainAspectRatio: false,

        }
      }
    });
  }

  const confCtx = document.getElementById('chart-conf');
  if (confCtx && conf.total_recordatorios_enviados > 0) {
    const pendiente = conf.total_recordatorios_enviados - conf.confirmados - conf.reagendaron - conf.cancelaron;
    charts.conf = new Chart(confCtx, {
      type: 'doughnut',
      data: {
        labels: ['Confirmados', 'Reagendaron', 'Cancelaron', 'Pendientes'],

          data: [conf.confirmados, conf.reagendaron, conf.cancelaron, Math.max(pendiente,0)],

        }]
      },

        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { font: { family: 'Inter', size: 12 }, padding: 12 } }
        }
      }
    });

    const filas = Object.entries(fid.por_campana);

        </tr>
      `).join('');
    }
  }

  // ── POST-CONSULTA desglose (pie) ──
  const pcCtx = document.getElementById('chart-postconsulta');
  if (pcCtx) {
    const pcLabels = Object.keys(fid.postconsulta_desglose);
    const pcData = Object.values(fid.postconsulta_desglose);
    const pcColors = { mejor:'#10b981', igual:'#f59e0b', peor:'#ef4444' };
    charts.pc = new Chart(pcCtx, {
      type: 'doughnut',
      data: {

        }]

  // ── REFERRAL tabla ──

      <tr><td>${refNombres[k]||k}</td><td><strong>${v}</strong></td></tr>
    `).join('');
  }

  // ── CANALES tabla ──
  const ctbody = document.getElementById('canales-tbody');
  if (ctbody) {

      </tr>

  }

  // ── MAPAS ──
  initMaps();
}

let mapComunas = null, mapDirecciones = null;
let dirClusters = null, dirHeat = null, dirPoints = null;


function buildDashTooltip(p) {
  let h = '<b>' + p.d + '</b><br>' + p.p + ' pac, ' + p.c + ' citas';
  if (p.det && p.det.length > 0) {
    h += '<br><span style="color:#94a3b8;font-size:12px">';
    p.det.slice(0, 3).forEach(function(d) {
      h += d.n + (d.a && d.a[0] ? ' — ' + d.a[0].split(' — ')[1] : '') + '<br>';
    });
    if (p.det.length > 3) h += '... +' + (p.det.length - 3) + ' más';
    h += '</span>';
  }
  return h;
}

function buildDashPopup(p) {
  let h = '<div style="max-width:320px;font-size:13px"><b style="font-size:14px">' + p.d + '</b>';
  h += '<br><span style="color:#64748b">' + p.p + ' paciente' + (p.p > 1 ? 's' : '') + ' · ' + p.c + ' cita' + (p.c > 1 ? 's' : '') + '</span>';
  if (p.det && p.det.length > 0) {
    p.det.forEach(function(d) {
      h += '<div style="margin-top:8px;padding-top:6px;border-top:1px solid #e2e8f0">';
      h += '<b style="color:#1e293b">' + d.n + '</b> <span style="color:#94a3b8">(' + d.c + ' cita' + (d.c > 1 ? 's' : '') + ')</span>';
      if (d.a && d.a.length > 0) {
        d.a.forEach(function(at) {
          var parts = at.split(' — ');
          h += '<div style="padding-left:10px;font-size:12px;color:#475569">';
          h += '<span style="color:#3b82f6">' + (parts[0] || '') + '</span>';
          if (parts[1]) h += ' — <span style="color:#8b5cf6">' + parts[1] + '</span>';
          h += '</div>';
        });
      }
      h += '</div>';
    });
  }
  h += '</div>';
  return h;
}

function initMaps() {
  // Limpiar mapas previos
  if (mapComunas) { mapComunas.remove(); mapComunas = null; }
  if (mapDirecciones) { mapDirecciones.remove(); mapDirecciones = null; }

  // ── MAPA COMUNAS ──
  const mcEl = document.getElementById('map-comunas');
  if (mcEl) {
    mapComunas = L.map('map-comunas').setView([-37.27, -73.28], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OSM', maxZoom: 18
    }).addTo(mapComunas);

    const maxPac = Math.max(...comunasData.map(c => c.pacientes), 1);
    const hd = comunasData.map(c => [c.lat, c.lng, c.pacientes / maxPac]);
    L.heatLayer(hd, {
      radius: 35, blur: 25, maxZoom: 13, max: 1.0,
      gradient: {0.2:'#2563eb',0.4:'#3b82f6',0.6:'#f59e0b',0.8:'#f97316',1:'#ef4444'},
    }).addTo(mapComunas);

    comunasData.forEach(c => {
      const r = Math.max(8, Math.min(30, Math.sqrt(c.pacientes) * 6));
      L.circleMarker([c.lat, c.lng], {
        radius: r, fillColor: '#3b82f6', color: '#1e293b',
        weight: 2, opacity: 0.9, fillOpacity: 0.6,
      }).bindPopup(`<b>${c.comuna}</b><br><b>${c.pacientes}</b> pacientes (${c.porcentaje}%)<br><b>${c.citas}</b> citas`)
        .addTo(mapComunas);
    });

    // Localidades
    const locColors = ['#ef4444','#f97316','#fbbf24','#3b82f6','#2563eb','#8b5cf6','#ec4899','#10b981','#06b6d4'];
    localidadesData.forEach((l, i) => {
      const r = Math.max(6, Math.min(20, Math.sqrt(l.pacientes) * 3));
      L.circleMarker([l.lat, l.lng], {
        radius: r, fillColor: locColors[i % locColors.length], color: '#fff',
        weight: 1.5, opacity: 0.9, fillOpacity: 0.6,
      }).bindPopup(`<b>${l.localidad}</b><br><b>${l.pacientes}</b> pacientes (${l.porcentaje}% de Arauco)`)
        .addTo(mapComunas);
    });

    if (comunasData.length) mapComunas.fitBounds(comunasData.map(c => [c.lat, c.lng]), { padding: [30, 30] });
  }

  // Tabla comunas
  const tcb = document.getElementById('tabla-comunas-dash');
  if (tcb) {
    const sorted = [...comunasData].sort((a,b) => b.pacientes - a.pacientes);
    const maxP = sorted[0]?.pacientes || 1;
    tcb.innerHTML = sorted.map((c, i) => `<tr>
      <td>${i+1}</td><td><strong>${c.comuna}</strong></td><td>${c.pacientes}</td>
      <td>${c.porcentaje}%</td>
      <td><div class="comuna-bar-bg"><div class="comuna-bar" style="width:${(c.pacientes/maxP*80)}px;background:#3b82f6"></div></div></td>
    </tr>`).join('');
  }

  // Tabla localidades
  const tlb = document.getElementById('tabla-localidades-dash');
  if (tlb) {
    const locColors = ['#ef4444','#f97316','#fbbf24','#3b82f6','#2563eb','#8b5cf6','#ec4899','#10b981','#06b6d4'];
    const sorted = [...localidadesData].sort((a,b) => b.pacientes - a.pacientes);
    const maxP = sorted[0]?.pacientes || 1;
    tlb.innerHTML = sorted.map((l, i) => `<tr>
      <td>${i+1}</td><td><strong>${l.localidad}</strong></td><td>${l.pacientes}</td>
      <td>${l.porcentaje}%</td>
      <td><div class="comuna-bar-bg"><div class="comuna-bar" style="width:${(l.pacientes/maxP*80)}px;background:${locColors[i%locColors.length]}"></div></div></td>
    </tr>`).join('');
  }

  // ── MAPA DIRECCIONES ──
  const mdEl = document.getElementById('map-direcciones');
  if (mdEl) {
    mapDirecciones = L.map('map-direcciones').setView([-37.25, -73.28], 13);
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OSM', maxZoom: 19
    });
    const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Esri', maxZoom: 19
    });
    osm.addTo(mapDirecciones);
    L.control.layers({'Mapa': osm, 'Satélite': sat}).addTo(mapDirecciones);

    // Clusters
    dirClusters = L.markerClusterGroup({ maxClusterRadius: 40, showCoverageOnHover: false });
    ptsData.forEach(p => {
      const m = L.circleMarker([p.lat, p.lng], {
        radius: Math.max(5, Math.min(12, p.p * 4)),
        fillColor: p.p > 2 ? '#ef4444' : p.p > 1 ? '#f59e0b' : '#3b82f6',
        color: '#1e293b', weight: 1.5, fillOpacity: 0.8,
      }).bindTooltip(buildDashTooltip(p), {sticky:true, direction:'top', offset:[0,-10]}).bindPopup(buildDashPopup(p), {maxWidth:360, maxHeight:400});
      dirClusters.addLayer(m);
    });
    dirClusters.addTo(mapDirecciones);

    // Heat
    dirHeat = L.heatLayer(ptsData.map(p => [p.lat, p.lng, p.p]), {
      radius: 25, blur: 20, maxZoom: 16, max: 5,
      gradient: {0.2:'#2563eb',0.4:'#3b82f6',0.6:'#fbbf24',0.8:'#f97316',1:'#ef4444'},
    });

    // Points
    dirPoints = L.layerGroup();
    ptsData.forEach(p => {
      const dot = L.circleMarker([p.lat, p.lng], {
        radius: Math.max(4, Math.min(10, p.p * 3)),
        fillColor: p.p > 2 ? '#ef4444' : p.p > 1 ? '#f59e0b' : '#3b82f6',
        color: '#fff', weight: 1, fillOpacity: 0.85,
      }).bindTooltip(buildDashTooltip(p), {sticky:true, direction:'top', offset:[0,-10]}).bindPopup(buildDashPopup(p), {maxWidth:360, maxHeight:400});
      dirPoints.addLayer(dot);
    });

    if (ptsData.length) mapDirecciones.fitBounds(ptsData.map(p => [p.lat, p.lng]), { padding: [30, 30] });
  }

  // Tabla top direcciones
  const tdb = document.getElementById('tabla-direcciones-dash');
  if (tdb) {
    const sorted = [...ptsData].sort((a,b) => b.p - a.p).slice(0, 15);
    tdb.innerHTML = sorted.map(p => `<tr>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.d}">${p.d}</td>
      <td><strong>${p.p}</strong></td><td>${p.c}</td>
    </tr>`).join('');
  }
}

function toggleDirLayer(name, btn) {
  if (!mapDirecciones) return;
  mapDirecciones.removeLayer(dirClusters);
  mapDirecciones.removeLayer(dirHeat);
  mapDirecciones.removeLayer(dirPoints);
  if (name === 'clusters') dirClusters.addTo(mapDirecciones);
  else if (name === 'heat') dirHeat.addTo(mapDirecciones);
  else if (name === 'points') dirPoints.addTo(mapDirecciones);
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// Init
loadData();
</script>
